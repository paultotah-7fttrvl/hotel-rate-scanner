    // =====================================================================
    //  RATE ENGINE
    //  ---------------------------------------------------------------
    //  DEMO MODE: Generates realistic simulated rates.
    //  PRODUCTION: Replace fetchRates() with a real API call.
    //  See README.md for integration instructions (Amadeus, SerpAPI, etc.)
    // =====================================================================
    function generateDemoRate(hotel, checkIn) {
      const d = new Date(checkIn);
      const dow = d.getDay();
      const month = d.getMonth();
      const charSum = hotel.id.split("").reduce((a, c) => a + c.charCodeAt(0), 0);
      const seed = (charSum * 31 + d.getDate() * 17 + month * 53 + dow * 7) % 100;
      let mult = 1;
      if (dow === 5 || dow === 6) mult += 0.18;  // weekend premium
      if (dow === 0) mult += 0.08;
      if (month >= 5 && month <= 8) mult += 0.22; // summer premium
      if (month === 11 || month === 0) mult += 0.15; // holiday premium
      const noise = (seed / 100 - 0.5) * hotel.variance;
      const rate = Math.round(hotel.baseRate * (mult + noise));
      return { rate: Math.max(Math.round(hotel.baseRate * 0.65), rate), available: seed > 5 };
    }

    let USE_LIVE_API = true;
    let LIVE_API_AVAILABLE = null;

    async function fetchRates(hotel, checkIn, checkOut) {
      if (USE_LIVE_API && hotel.taKey) {
        try {
          const params = new URLSearchParams({ hotel_key: hotel.taKey, chk_in: checkIn, chk_out: checkOut });
          const res = await fetch(`/api/rates?${params}`);
          const data = await res.json();
          if (data.error) {
            console.warn("API error, falling back to demo:", data.error);
            return generateDemoRate(hotel, checkIn);
          }
          LIVE_API_AVAILABLE = true;
          if (data.rate != null && data.available) {
            return {
              rate: data.rate,
              available: true,
              source: "live",
              providers: data.providers,
            };
          }
          return { rate: null, available: false, source: "live" };
        } catch (err) {
          console.warn("API unreachable, falling back to demo:", err.message);
          USE_LIVE_API = false;
          LIVE_API_AVAILABLE = false;
          return generateDemoRate(hotel, checkIn);
        }
      }
      return generateDemoRate(hotel, checkIn);
    }

    // =====================================================================
    //  UTILITIES
    // =====================================================================
    function nightsBetween(a, b) { return Math.max(1, Math.round((new Date(b) - new Date(a)) / 86400000)); }
    function fmtDate(s) { if (!s) return ""; return new Date(s + "T12:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric" }); }
    function fmtUSD(n) { return "$" + n.toLocaleString(); }

    function buildBookingUrl(hotel, checkIn, checkOut) {
      const c = hotel.chain, code = hotel.chainCode;
      if (!c || !code) return hotel.url;
      if (c === "hilton") return `https://www.hilton.com/en/book/reservation/rooms/?ctyhocn=${code}&arrivalDate=${checkIn}&departureDate=${checkOut}&room1NumAdults=1`;
      if (c === "marriott") return `https://www.marriott.com/reservation/availabilitySearch.mi?propertyCode=${code}&fromDate=${checkIn}&toDate=${checkOut}`;
      if (c === "ihg") {
        const d1 = new Date(checkIn+"T12:00:00"), d2 = new Date(checkOut+"T12:00:00");
        return `https://www.ihg.com/kimptonhotels/hotels/us/en/${code}/hoteldetail?qCiD=${d1.getDate()}&qCiMy=${String(d1.getMonth()).padStart(2,"0")}${d1.getFullYear()}&qCoD=${d2.getDate()}&qCoMy=${String(d2.getMonth()).padStart(2,"0")}${d2.getFullYear()}&qRms=1&qAdlt=1`;
      }
      if (c === "fairmont") return `https://www.fairmont.com/${code}/reservations/?checkIn=${checkIn}&checkOut=${checkOut}&adults=1`;
      if (c === "hyatt") return `https://www.hyatt.com/shop/rooms/${code}?location=${encodeURIComponent(hotel.name)}&checkinDate=${checkIn}&checkoutDate=${checkOut}&rooms=1&adults=1&kids=0&rate=Standard`;
      return hotel.url;
    }

    // =====================================================================
    //  COMPONENTS
    // =====================================================================
    function Stars({ n }) {
      return <span style={{ color: "#D4A053", fontSize: 12, letterSpacing: 1 }}>{"★".repeat(n)}{"☆".repeat(5 - n)}</span>;
    }

    // --- Hotel Search ---
    function SearchPanel({ selected, onToggle, clearSignal }) {
      const [q, setQ] = useState("");
      const [open, setOpen] = useState(false);
      const ref = useRef(null);

      useEffect(() => { if (clearSignal > 0) { setQ(""); setOpen(false); } }, [clearSignal]);

      useEffect(() => {
        const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
        document.addEventListener("mousedown", handler);
        return () => document.removeEventListener("mousedown", handler);
      }, []);

      const term = q.trim().toLowerCase();
      const results = term.length >= 2
        ? HOTELS.filter(h => (h.name + " " + h.city + " " + h.region).toLowerCase().includes(term)).slice(0, 15)
        : [];

      const grouped = {};
      results.forEach(h => { const k = h.city + ", " + h.region; if (!grouped[k]) grouped[k] = []; grouped[k].push(h); });
      const allCities = [...new Set(HOTELS.map(h => h.city))].sort();

      return (
        <div style={{ position: "relative" }} ref={ref}>
          <label style={S.label}>Search Hotels Worldwide</label>
          <div style={S.searchWrap}>
            <span style={S.searchIcon}>&#x2315;</span>
            <input style={S.searchInput} placeholder={"Any city (" + allCities.slice(0, 5).join(", ") + "...)"} value={q}
              onChange={(e) => { setQ(e.target.value); setOpen(true); }} onFocus={() => setOpen(true)} />
            {q && <span style={S.clearBtn} onClick={() => { setQ(""); setOpen(false); }}>&times;</span>}
          </div>
          {open && term.length >= 2 && (
            <div style={S.dropdown}>
              {results.length === 0 ? (
                <div style={S.noResults}>
                  <div>No hotels for "{q}"</div>
                  <div style={{ fontSize: 11, color: "#999", marginTop: 6 }}>Try: {allCities.join(", ")}</div>
                </div>
              ) : Object.entries(grouped).map(([city, hotels]) => (
                <div key={city}>
                  <div style={S.cityHead}>{city}</div>
                  {hotels.map(h => {
                    const isSel = selected.some(s => s.id === h.id);
                    const full = !isSel && selected.length >= 5;
                    return (
                      <div key={h.id} style={{ ...S.item, opacity: full ? 0.35 : 1, background: isSel ? "rgba(212,160,83,0.08)" : "transparent" }}
                        onClick={() => { if (!full) onToggle(h); }}>
                        <span style={{ fontSize: 20, marginRight: 10 }}>{h.img}</span>
                        <div style={{ flex: 1 }}>
                          <div style={S.hName}>{h.name}</div>
                          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                            <Stars n={h.stars} />
                            <span style={{ fontSize: 11, color: "#666" }}>~{fmtUSD(h.baseRate)}/night</span>
                          </div>
                        </div>
                        <span style={{ ...S.badge, background: isSel ? "#D4A053" : "transparent", color: isSel ? "#fff" : "#999", border: isSel ? "none" : "1.5px solid #ccc" }}>
                          {isSel ? "\u2713" : "+"}
                        </span>
                      </div>
                    );
                  })}
                </div>
              ))}
            </div>
          )}
          {selected.length > 0 && (
            <div style={S.chips}>
              {selected.map(h => (
                <span key={h.id} style={S.chip}>
                  {h.img} {h.name}
                  <span style={S.chipX} onClick={() => onToggle(h)}>&times;</span>
                </span>
              ))}
            </div>
          )}
          <div style={S.hint}>{selected.length}/5 hotels selected</div>
        </div>
      );
    }

    // --- Date Range Picker (unified calendar) ---
    const CAL_MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];

    function DateRangePicker({ checkIn, checkOut, onChange, minDate }) {
      const [open, setOpen] = useState(false);
      const [phase, setPhase] = useState("in");
      const [tempIn, setTempIn] = useState(null);
      const [hover, setHover] = useState(null);
      const ref = useRef(null);
      const [vm, setVm] = useState(() => {
        const d = checkIn ? new Date(checkIn + "T12:00:00") : new Date();
        return { y: d.getFullYear(), m: d.getMonth() };
      });

      useEffect(() => {
        const h = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
        document.addEventListener("mousedown", h);
        return () => document.removeEventListener("mousedown", h);
      }, []);

      const openCal = () => {
        setPhase("in"); setTempIn(null); setHover(null);
        const d = checkIn ? new Date(checkIn + "T12:00:00") : new Date();
        setVm({ y: d.getFullYear(), m: d.getMonth() });
        setOpen(true);
      };

      const nav = (dir) => setVm(p => {
        let m = p.m + dir, y = p.y;
        if (m < 0) { m = 11; y--; } if (m > 11) { m = 0; y++; }
        return { y, m };
      });

      const pick = (ds) => {
        if (phase === "in") { setTempIn(ds); setPhase("out"); setHover(null); }
        else {
          if (ds <= tempIn) { setTempIn(ds); setHover(null); }
          else { onChange(tempIn, ds); setOpen(false); }
        }
      };

      const toStr = (y, m, d) => `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
      const m2y = vm.m === 11 ? vm.y + 1 : vm.y;
      const m2m = vm.m === 11 ? 0 : vm.m + 1;

      const renderMonth = (y, m) => {
        const dim = new Date(y, m+1, 0).getDate();
        const fd = new Date(y, m, 1).getDay();
        const cells = [];
        for (let i = 0; i < fd; i++) cells.push(null);
        for (let d = 1; d <= dim; d++) cells.push(toStr(y, m, d));
        return (
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ textAlign: "center", fontSize: 12, fontWeight: 600, color: "#333", marginBottom: 6 }}>{CAL_MONTHS[m]} {y}</div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)" }}>
              {["Su","Mo","Tu","We","Th","Fr","Sa"].map(d => (
                <div key={d} style={{ textAlign: "center", fontSize: 9, color: "#999", padding: "3px 0", fontWeight: 700 }}>{d}</div>
              ))}
              {cells.map((ds, i) => {
                if (!ds) return <div key={`e${i}`} />;
                const past = ds < minDate;
                const start = phase === "out" && ds === tempIn;
                const endD = phase === "out" && hover && hover > tempIn ? hover : null;
                const end = endD && ds === endD;
                const inR = phase === "out" && tempIn && endD && ds > tempIn && ds < endD;
                const dn = parseInt(ds.split("-")[2]);
                return (
                  <div key={ds} onClick={() => !past && pick(ds)}
                    onMouseEnter={() => { if (!past && phase === "out") setHover(ds); }}
                    style={{
                      textAlign: "center", padding: "5px 0", fontSize: 12, lineHeight: "22px",
                      cursor: past ? "default" : "pointer",
                      color: past ? "#ccc" : (start || end) ? "#fff" : inR ? "#1a1a2e" : "#444",
                      background: (start || end) ? "#D4A053" : inR ? "rgba(212,160,83,0.18)" : "transparent",
                      borderRadius: start ? "50% 0 0 50%" : end ? "0 50% 50% 0" : 0,
                      fontWeight: (start || end) ? 700 : 400,
                    }}>
                    {dn}
                  </div>
                );
              })}
            </div>
          </div>
        );
      };

      const label = checkIn && checkOut
        ? `${fmtDate(checkIn)} \u2192 ${fmtDate(checkOut)}  \u00B7  ${nightsBetween(checkIn, checkOut)} night${nightsBetween(checkIn, checkOut) > 1 ? "s" : ""}`
        : "Select dates";

      return (
        <div style={{ flex: 1, position: "relative" }} ref={ref}>
          <div onClick={openCal} style={{
            padding: "8px 12px", fontSize: 12, background: "#f5f6f8", border: "1px solid #e0e0e0",
            borderRadius: 6, color: checkIn && checkOut ? "#1a1a2e" : "#999", cursor: "pointer", fontFamily: "'DM Sans', sans-serif",
          }}>{label}</div>
          {open && (
            <div onMouseLeave={() => setHover(null)} style={{
              position: "absolute", top: "calc(100% + 4px)", left: 0, zIndex: 200,
              background: "#fff", border: "1px solid #e4e6ea", borderRadius: 10,
              padding: 16, boxShadow: "0 8px 30px rgba(0,0,0,0.12)", width: 380,
            }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                <button onClick={() => nav(-1)} style={{ background: "none", border: "1px solid #e0e0e0", color: "#888", fontSize: 16, cursor: "pointer", borderRadius: 4, padding: "2px 8px", lineHeight: 1 }}>&lsaquo;</button>
                <div style={{ fontSize: 11, fontWeight: 600, color: phase === "in" ? "#D4A053" : "#5cb85c", letterSpacing: 0.3 }}>
                  {phase === "in" ? "Select check-in" : "Select check-out"}
                </div>
                <button onClick={() => nav(1)} style={{ background: "none", border: "1px solid #e0e0e0", color: "#888", fontSize: 16, cursor: "pointer", borderRadius: 4, padding: "2px 8px", lineHeight: 1 }}>&rsaquo;</button>
              </div>
              <div style={{ display: "flex", gap: 12 }}>
                {renderMonth(vm.y, vm.m)}
                {renderMonth(m2y, m2m)}
              </div>
              {tempIn && phase === "out" && (
                <div style={{ textAlign: "center", fontSize: 10, color: "#888", marginTop: 8 }}>
                  Check-in: <strong style={{ color: "#D4A053" }}>{fmtDate(tempIn)}</strong> — now pick check-out
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    // --- Date Ranges ---
    function DatePanel({ ranges, onUpdate, onAdd, onRemove }) {
      const today = new Date().toISOString().split("T")[0];
      return (
        <div>
          <label style={S.label}>Date Ranges</label>
          <div style={S.hint}>Add 2-10 date ranges to compare</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 8, marginTop: 10 }}>
            {ranges.map((dr, i) => (
              <div key={i} style={S.dateRow}>
                <span style={S.dateIdx}>#{i + 1}</span>
                <DateRangePicker checkIn={dr.checkIn} checkOut={dr.checkOut} minDate={today}
                  onChange={(ci, co) => onUpdate(i, ci, co)} />
                {ranges.length > 2 && <button style={S.rmBtn} onClick={() => onRemove(i)}>&times;</button>}
              </div>
            ))}
          </div>
          {ranges.length < 10
            ? <button style={S.addBtn} onClick={onAdd}>+ Add Date Range</button>
            : <div style={{ ...S.hint, color: "#D4A053", marginTop: 8 }}>Maximum 10 date ranges</div>}
        </div>
      );
    }

    // --- Results Table ---
    function ResultsTable({ data, hotels, dates, best }) {
      return (
        <div style={S.tWrap}>
          <table style={S.table}>
            <thead>
              <tr>
                <th style={{ ...S.th, minWidth: 200, position: "sticky", left: 0, zIndex: 2, background: "#f8f9fb" }}>Hotel</th>
                {dates.map((dr, i) => (
                  <th key={i} style={{ ...S.th, minWidth: 170 }}>
                    <div style={{ fontSize: 13, fontWeight: 700 }}>{fmtDate(dr.checkIn)} &ndash; {fmtDate(dr.checkOut)}</div>
                    <div style={{ fontSize: 11, fontWeight: 400, opacity: 0.5, marginTop: 2 }}>
                      {nightsBetween(dr.checkIn, dr.checkOut)} night{nightsBetween(dr.checkIn, dr.checkOut) > 1 ? "s" : ""}
                    </div>
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {hotels.map(h => (
                <tr key={h.id}>
                  <td style={{ ...S.td, position: "sticky", left: 0, zIndex: 1, background: "#fff" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <span style={{ fontSize: 22 }}>{h.img}</span>
                      <div>
                        <div style={{ fontWeight: 600, fontSize: 13, color: "#1a1a2e" }}>{h.name}</div>
                        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                          <Stars n={h.stars} />
                          <span style={{ fontSize: 10, color: "#999" }}>{h.city}</span>
                        </div>
                      </div>
                    </div>
                  </td>
                  {dates.map((dr, di) => {
                    const r = data[h.id] && data[h.id][di];
                    if (!r) return <td key={di} style={S.td}><span style={{ animation: "pulse 1s infinite", color: "#bbb" }}>...</span></td>;
                    const isB = best && best.hid === h.id && best.di === di;
                    if (!r.available) return (
                      <td key={di} style={{ ...S.td, opacity: 0.4 }}>
                        <div style={{ fontSize: 12, color: "#ff6b6b" }}>No rooms available</div>
                      </td>
                    );
                    const n = nightsBetween(dr.checkIn, dr.checkOut);
                    const tot = r.rate * n;
                    const bookUrl = buildBookingUrl(h, dr.checkIn, dr.checkOut);
                    const allRates = dates.map((_, j) => data[h.id] && data[h.id][j]).filter(x => x && x.available).map(x => x.rate);
                    const avgRate = allRates.length > 1 ? Math.round(allRates.reduce((a,b) => a+b, 0) / allRates.length) : null;
                    const delta = avgRate ? r.rate - avgRate : null;
                    return (
                      <td key={di} style={{ ...S.td, background: isB ? "rgba(212,160,83,0.08)" : "transparent", borderLeft: isB ? "2px solid #D4A053" : "1px solid #f0f0f0" }}>
                        {isB && <div style={S.bestTag}>BEST RATE</div>}
                        <div style={{ fontSize: 9, color: "#999", letterSpacing: 0.5, marginBottom: 2 }}>EST. MARKET RATE</div>
                        <div style={{ fontSize: 20, fontWeight: 700, color: isB ? "#D4A053" : "#1a1a2e", fontFamily: "'DM Serif Display', Georgia, serif" }}>{fmtUSD(r.rate)}</div>
                        <div style={{ fontSize: 11, color: "#888", margin: "2px 0 4px" }}>avg/night &middot; {fmtUSD(tot)} total</div>
                        {delta !== null && delta !== 0 && (
                          <div style={{ fontSize: 10, color: delta < 0 ? "#5cb85c" : "#ff6b6b", marginBottom: 6, fontWeight: 500 }}>
                            {delta < 0 ? `${fmtUSD(Math.abs(delta))}/nt cheaper` : `${fmtUSD(delta)}/nt more`} vs avg
                          </div>
                        )}
                        {delta === 0 && <div style={{ fontSize: 10, color: "#999", marginBottom: 6 }}>avg across dates</div>}
                        <a className="book-link" href={bookUrl} target="_blank" rel="noopener noreferrer"
                          style={{ ...S.bookBtn, background: isB ? "#D4A053" : "transparent", color: isB ? "#fff" : "#D4A053", border: isB ? "none" : "1px solid #D4A053" }}>
                          Book My Stay &rarr;
                        </a>
                      </td>
                    );
                  })}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    // --- Summary Cards ---
    function Summary({ data, hotels, dates, best }) {
      if (!best) return null;
      const hotel = hotels.find(h => h.id === best.hid);
      const dr = dates[best.di];
      const n = nightsBetween(dr.checkIn, dr.checkOut);
      let allTotals = [];
      let worstTotal = 0;
      hotels.forEach(h => dates.forEach((d, di) => {
        const r = data[h.id] && data[h.id][di];
        if (r && r.available) {
          const t = r.rate * nightsBetween(d.checkIn, d.checkOut);
          allTotals.push(t);
          if (t > worstTotal) worstTotal = t;
        }
      }));
      const avg = allTotals.length ? Math.round(allTotals.reduce((a, b) => a + b, 0) / allTotals.length) : 0;
      const saveVsAvg = avg - best.total;
      const saveVsWorst = worstTotal - best.total;

      return (
        <div style={S.sumRow}>
          <div style={S.sumCard}><div style={S.sumLbl}>Best Rate</div><div style={S.sumVal}>{fmtUSD(best.rate)}</div><div style={S.sumDet}>per night (est.)</div></div>
          <div style={S.sumCard}><div style={S.sumLbl}>Best Dates</div><div style={{ ...S.sumVal, fontSize: 16 }}>{fmtDate(dr.checkIn)} &ndash; {fmtDate(dr.checkOut)}</div><div style={S.sumDet}>{hotel && hotel.name}</div></div>
          <div style={S.sumCard}><div style={S.sumLbl}>Est. Total</div><div style={S.sumVal}>{fmtUSD(best.total)}</div><div style={S.sumDet}>{n} night{n > 1 ? "s" : ""}</div></div>
          <div style={S.sumCard}><div style={S.sumLbl}>You Could Save</div><div style={{ ...S.sumVal, color: saveVsWorst > 0 ? "#5cb85c" : "#1a1a2e" }}>{saveVsWorst > 0 ? fmtUSD(saveVsWorst) : "\u2014"}</div><div style={S.sumDet}>{saveVsWorst > 0 ? "vs. most expensive option" : ""}</div></div>
        </div>
      );
    }

    // =====================================================================
    //  MAIN APP
    // =====================================================================
    function App() {
      const [sel, setSel] = useState([]);
      const [dates, setDates] = useState([{ checkIn: "", checkOut: "" }, { checkIn: "", checkOut: "" }]);
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(false);
      const [best, setBest] = useState(null);
      const [show, setShow] = useState(false);

      const [clearSig, setClearSig] = useState(0);
      const toggle = (h) => { setSel(p => p.some(x => x.id === h.id) ? p.filter(x => x.id !== h.id) : p.length < 5 ? [...p, h] : p); setShow(false); setClearSig(c => c + 1); };

      const updDate = (i, checkIn, checkOut) => {
        setDates(p => { const n = [...p]; n[i] = { checkIn, checkOut }; return n; });
        setShow(false);
      };

      const addDate = () => { if (dates.length < 10) setDates(p => [...p, { checkIn: "", checkOut: "" }]); };
      const rmDate = (i) => { setDates(p => p.filter((_, j) => j !== i)); setShow(false); };

      const valid = dates.filter(d => d.checkIn && d.checkOut && d.checkOut > d.checkIn);
      const canGo = sel.length >= 1 && valid.length >= 2;

      const compare = async () => {
        setLoading(true); setShow(true); setBest(null); setData({});
        const res = {}; let b = null;
        for (const hotel of sel) {
          res[hotel.id] = {};
          for (let di = 0; di < valid.length; di++) {
            const dr = valid[di];
            const r = await fetchRates(hotel, dr.checkIn, dr.checkOut);
            res[hotel.id][di] = r;
            if (r.available) {
              const t = r.rate * nightsBetween(dr.checkIn, dr.checkOut);
              if (!b || t < b.total) b = { hid: hotel.id, di: di, rate: r.rate, total: t };
            }
            setData({...res}); setBest(b ? {...b} : null);
          }
        }
        setLoading(false);
      };

      const cities = [...new Set(HOTELS.map(h => h.city))];

      return (
        <div style={S.app}>
          <header style={S.header}>
            <div style={S.headerIn}>
              <div>
                <h1 style={S.h1}><span style={{ color: "#D4A053" }}>&#x27D0;</span> Hotel Rate Scanner</h1>
                <p style={S.sub}>Compare hotel rates across flexible dates. {HOTELS.length} hotels in {cities.length} destinations.</p>
              </div>
              <div style={S.headerBadge}>MULTI-DATE</div>
            </div>
          </header>

          <div style={S.main}>
            <div style={S.grid}>
              <div style={S.card}><div style={S.cNum}>01</div><SearchPanel selected={sel} onToggle={toggle} clearSignal={clearSig} /></div>
              <div style={S.card}><div style={S.cNum}>02</div><DatePanel ranges={dates} onUpdate={updDate} onAdd={addDate} onRemove={rmDate} /></div>
            </div>
            <div style={{ textAlign: "center", marginTop: 24 }}>
              <button style={{ ...S.cmpBtn, opacity: canGo ? 1 : 0.35, cursor: canGo ? "pointer" : "not-allowed" }} disabled={!canGo || loading} onClick={compare}>
                {loading ? <span style={{ animation: "pulse 1s infinite" }}>Scanning rates...</span> : "Compare Rates"}
              </button>
              {!canGo && <div style={{ fontSize: 12, color: "#666", marginTop: 6 }}>Select at least 1 hotel and enter 2+ valid date ranges</div>}
            </div>
          </div>

          {show && data && (
            <div style={{ animation: "fadeUp 0.5s ease" }}>
              <div style={S.divider}><span style={S.divLine} /><span style={S.divTxt}>Results</span><span style={S.divLine} /></div>
              <Summary data={data} hotels={sel} dates={valid} best={best} />
              <ResultsTable data={data} hotels={sel} dates={valid} best={best} />
              <div style={S.foot}>
                {LIVE_API_AVAILABLE
                  ? <><strong style={{color:"#5cb85c"}}>&#9679; Live market rates</strong> — estimated rates for date comparison. Final price confirmed on hotel website.</>
                  : <><strong>Demo mode:</strong> Rates are simulated. Start the server for live pricing.</>}
                <br />"Book My Stay" opens the hotel's official booking page with your dates pre-selected.
              </div>
            </div>
          )}
        </div>
      );
    }

    // =====================================================================
    //  STYLES
    // =====================================================================
    const S = {
      app: { fontFamily: "'DM Sans', sans-serif", background: "#f0f2f5", color: "#1a1a2e", minHeight: "100vh", paddingBottom: 60 },
