    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body { font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif; background: #FAFAF8; color: #1a1a1a; line-height: 1.5; }

    /* Scrollbar */
    ::-webkit-scrollbar { height: 5px; width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }

    /* Custom date range picker */
    .drp-day { text-align: center; padding: 6px 2px; border-radius: 6px; font-size: 12px; cursor: pointer; transition: background 0.1s; }
    .drp-day:hover:not(.drp-disabled) { background: #f0ede8; }
    .drp-day.drp-disabled { color: #ddd; cursor: not-allowed; }
    .drp-day.drp-start, .drp-day.drp-end { background: #2C1810 !important; color: #fff !important; font-weight: 700; }
    .drp-day.drp-in-range { background: #FAEEDA; color: #412402; }
    .drp-day.drp-today { outline: 1px solid #ddd; }

    /* Search input */
    input[type="text"] {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      border: none;
      outline: none;
      background: transparent;
      color: #F5E6D8;
      width: 100%;
    }
    input[type="text"]::placeholder { color: #8B7D6E; }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .fade-up { animation: fadeUp 0.4s ease-out both; }
    .fade-in { animation: fadeIn 0.3s ease-out both; }
    .slide-down { animation: slideDown 0.3s ease-out both; }

    /* Pill hover */
    .hotel-pill { transition: all 0.15s ease; }
    .hotel-pill:hover { transform: translateY(-1px); }

    /* Button hover */
    .btn-primary {
      transition: all 0.15s ease;
      cursor: pointer;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    .btn-outline {
      transition: all 0.15s ease;
      cursor: pointer;
    }
    .btn-outline:hover { background: #f5f5f3; }

    /* Result row hover */
    .result-row { transition: background 0.15s ease; }
    .result-row:hover { background: rgba(0,0,0,0.015); }

    /* Link styles */
    a { color: inherit; text-decoration: none; }
    a:hover { opacity: 0.8; }

    /* Search dropdown */
    .search-dropdown {
      position: absolute; top: calc(100% + 6px); left: 0; right: 0;
      background: #fff; border-radius: 10px; border: 1px solid #eee;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12); z-index: 100;
      overflow: hidden;
    }
    .search-dropdown-item {
      padding: 10px 16px; cursor: pointer; font-size: 13px; color: #1a1a1a;
      display: flex; align-items: center; justify-content: space-between;
      transition: background 0.1s;
    }
    .search-dropdown-item:hover { background: #f5f5f3; }
  </style>

      const dow = d.getDay();
      const month = d.getMonth();
      const charSum = hotel.id.split("").reduce((a, c) => a + c.charCodeAt(0), 0);
      const seed = (charSum * 31 + d.getDate() * 17 + month * 53 + dow * 7) % 100;
      let multiplier = 1;
      if (dow === 5 || dow === 6) multiplier += 0.15;
      if (dow === 0) multiplier += 0.08;
      if (month >= 5 && month <= 8) multiplier += 0.20;
      if (month === 11) multiplier += 0.18;
      const noise = (seed / 100 - 0.5) * (hotel.variance || 0.3);
      const rate = Math.round(hotel.baseRate * (multiplier + noise));
      const available = seed > 6;
      return { rate: Math.max(Math.round(hotel.baseRate * 0.6), rate), available };
    }

    function nightsBetween(d1, d2) {
      return Math.max(1, Math.round((new Date(d2) - new Date(d1)) / 86400000));
    }

    function formatDate(dateStr) {
      if (!dateStr) return "";
      const d = new Date(dateStr + "T12:00:00");
      return d.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
    }

    function formatDateShort(dateStr) {
      if (!dateStr) return "";
      const d = new Date(dateStr + "T12:00:00");
      return d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
    }

    function formatCurrency(n) {
      return "$" + n.toLocaleString();
    }

    // =====================================================================
    //  BOOKING URL BUILDER — chain deep links + Booking.com fallback
    // =====================================================================
    function formatMMDDYYYY(ds) { const [y,m,d] = ds.split("-"); return `${m}/${d}/${y}`; }
    function parseIHGDate(ds) { const [y,m,d] = ds.split("-"); return { day: d, monthYear: `${String(parseInt(m)-1).padStart(2,'0')}${y}` }; }

    function buildBookingUrl(hotel, checkIn, checkOut) {
      switch (hotel.chain) {
        case "marriott":
          return `https://www.marriott.com/reservation/availabilitySearch.mi?propertyCode=${hotel.chainPropertyCode}&fromDate=${formatMMDDYYYY(checkIn)}&toDate=${formatMMDDYYYY(checkOut)}`;
        case "ritzcarlton":
          return `https://www.ritzcarlton.com/en/hotels/${hotel.chainSlug}/rooms-rates/?fromDate=${formatMMDDYYYY(checkIn)}&toDate=${formatMMDDYYYY(checkOut)}`;
        case "hilton":
          return `https://www.hilton.com/en/book/reservation/rooms/?ctyhocn=${hotel.chainPropertyCode}&arrivalDate=${checkIn}&departureDate=${checkOut}&room1NumAdults=2`;
        case "hyatt": {
          const sc = hotel.chainPropertyCode.toLowerCase();
          return `https://www.hyatt.com/shop/rooms/${sc}?location=${sc}&checkinDate=${checkIn}&checkoutDate=${checkOut}&adults=2&rooms=1`;
        }
        case "ihg": {
          const ci = parseIHGDate(checkIn), co = parseIHGDate(checkOut);
          return `https://www.ihg.com/redirect?path=rates&brandCode=${hotel.chainBrandCode}&hotelCode=${hotel.chainPropertyCode}&checkInDate=${ci.day}&checkInMonthYear=${ci.monthYear}&checkOutDate=${co.day}&checkOutMonthYear=${co.monthYear}&numberOfAdults=2`;
        }
        case "wyndham":
          return `https://www.wyndhamhotels.com/hotels/${hotel.chainPropertyCode}/rooms-rates?checkin_date=${formatMMDDYYYY(checkIn)}&checkout_date=${formatMMDDYYYY(checkOut)}&adults=2&rooms=1`;
        case "bestwestern":
          return `https://www.bestwestern.com/en_US/book/hotel-rooms/${hotel.chainSlug}/propertyCode.${hotel.chainPropertyCode}.html?checkIn=${checkIn}&checkOut=${checkOut}`;
        case "choice":
          return `https://www.choicehotels.com/reservations/hotels/${hotel.chainPropertyCode}?checkInDate=${checkIn}&checkOutDate=${checkOut}&adults=2`;
        default: {
          const q = encodeURIComponent(`${hotel.name} ${hotel.city}`);
          return `https://www.booking.com/searchresults.html?ss=${q}&checkin=${checkIn}&checkout=${checkOut}&group_adults=2&no_rooms=1&selected_currency=USD`;
        }
      }
    }

    // =====================================================================
    //  DATE RANGE PICKER COMPONENT
    // =====================================================================
    function DateRangePicker({ value, onChange, minDate, colorDot }) {
      const today = minDate || new Date().toISOString().split("T")[0];
      const [open, setOpen] = useState(false);
      const [step, setStep] = useState("checkIn");
      const [tempCheckIn, setTempCheckIn] = useState(null);
      const [hoverDate, setHoverDate] = useState(null);
      const initMonth = () => {
        const src = value.checkIn || today;
        const d = new Date(src + "T12:00:00");
        return { y: d.getFullYear(), m: d.getMonth() };
      };
      const [view, setView] = useState(initMonth);
      const wrapRef = useRef(null);

      useEffect(() => {
        const handler = (e) => {
          if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false);
        };
        document.addEventListener("mousedown", handler);
        return () => document.removeEventListener("mousedown", handler);
      }, []);

      const handleOpen = () => {
        setOpen(o => !o);
        setStep("checkIn");
        setTempCheckIn(null);
        setHoverDate(null);
        setView(initMonth());
      };

      const handleDayClick = (dateStr) => {
        if (step === "checkIn") {
          setTempCheckIn(dateStr);
          setStep("checkOut");
          setHoverDate(null);
        } else {
          if (dateStr <= tempCheckIn) {
            // clicked same or earlier — restart
            setTempCheckIn(dateStr);
            setHoverDate(null);
            return;
          }
          onChange({ checkIn: tempCheckIn, checkOut: dateStr });
          setOpen(false);
          setStep("checkIn");
          setTempCheckIn(null);
        }
      };

      const getDays = (y, m) => {
        const firstDay = new Date(y, m, 1).getDay();
        const total = new Date(y, m + 1, 0).getDate();
        const days = Array(firstDay).fill(null);
        for (let d = 1; d <= total; d++) {
          days.push(`${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`);
        }
        return days;
      };

      const prevMonth = () => setView(v => {
        if (v.m === 0) return { y: v.y - 1, m: 11 };
        return { y: v.y, m: v.m - 1 };
      });
      const nextMonth = () => setView(v => {
        if (v.m === 11) return { y: v.y + 1, m: 0 };
        return { y: v.y, m: v.m + 1 };
      });

      const monthLabel = new Date(view.y, view.m).toLocaleDateString("en-US", { month: "long", year: "numeric" });
      const days = getDays(view.y, view.m);

      const startDate = step === "checkOut" ? tempCheckIn : value.checkIn;
      const endDate = step === "checkOut" ? hoverDate : value.checkOut;

      const fmtShort = (ds) => {
        if (!ds) return null;
        const d = new Date(ds + "T12:00:00");
        return d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
      };
      const nights = value.checkIn && value.checkOut
        ? Math.round((new Date(value.checkOut) - new Date(value.checkIn)) / 86400000) : 0;

      return (
        <div ref={wrapRef} style={{ position: "relative", flex: 1 }}>
          {/* Trigger */}
          <div
            onClick={handleOpen}
            style={{
              display: "flex", alignItems: "center", gap: 8,
              background: "#fff", border: open ? "1px solid #2C1810" : "1px solid #ddd",
              borderRadius: 8, padding: "8px 12px", cursor: "pointer", userSelect: "none",
              transition: "border-color 0.2s",
            }}
          >
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
              <rect x="1" y="2" width="12" height="11" rx="1.5" stroke="#aaa" strokeWidth="1.1"/>
              <path d="M1 6h12" stroke="#aaa" strokeWidth="1.1"/>
              <rect x="3" y="1" width="1.5" height="2.5" rx="0.5" fill="#aaa"/>
              <rect x="9.5" y="1" width="1.5" height="2.5" rx="0.5" fill="#aaa"/>
            </svg>
            {value.checkIn && value.checkOut ? (
              <span style={{ fontSize: 13, color: "#1a1a1a", fontWeight: 500 }}>
                {fmtShort(value.checkIn)} → {fmtShort(value.checkOut)}
                <span style={{ color: "#aaa", fontWeight: 400, marginLeft: 6, fontSize: 12 }}>
                  {nights} night{nights !== 1 ? "s" : ""}
                </span>
              </span>
            ) : step === "checkOut" && tempCheckIn ? (
              <span style={{ fontSize: 13, color: "#1a1a1a" }}>
                {fmtShort(tempCheckIn)} → <span style={{ color: "#C4A882" }}>pick check-out</span>
              </span>
            ) : (
              <span style={{ fontSize: 13, color: "#aaa" }}>Select dates</span>
            )}
          </div>

          {/* Calendar */}
          {open && (
            <div style={{
              position: "absolute", top: "calc(100% + 6px)", left: 0, zIndex: 200,
              background: "#fff", borderRadius: 12, border: "1px solid #eee",
              boxShadow: "0 8px 32px rgba(0,0,0,0.12)", padding: "16px 14px",
              minWidth: 260,
            }}>
              <p style={{
                fontSize: 11, fontWeight: 600, textAlign: "center", margin: "0 0 12px",
                color: step === "checkIn" ? "#854F0B" : "#085041",
              }}>
                {step === "checkIn" ? "Select check-in" : `Check-in ${fmtShort(tempCheckIn)} — select check-out`}
              </p>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
                <button onClick={prevMonth} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 18, color: "#666", padding: "0 6px", lineHeight: 1 }}>‹</button>
                <span style={{ fontSize: 13, fontWeight: 600 }}>{monthLabel}</span>
                <button onClick={nextMonth} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 18, color: "#666", padding: "0 6px", lineHeight: 1 }}>›</button>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 1, marginBottom: 4 }}>
                {["Su","Mo","Tu","We","Th","Fr","Sa"].map(d => (
                  <div key={d} style={{ textAlign: "center", fontSize: 10, color: "#bbb", fontWeight: 600, padding: "2px 0" }}>{d}</div>
                ))}
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 1 }}>
                {days.map((ds, i) => {
                  if (!ds) return <div key={`e${i}`} />;
                  const disabled = ds < today;
                  const isStart = ds === startDate;
                  const isEnd = endDate && ds === endDate && endDate > startDate;
                  const inRange = startDate && endDate && ds > startDate && ds < endDate && endDate > startDate;
                  const isToday = ds === today;
                  let cls = "drp-day";
                  if (disabled) cls += " drp-disabled";
                  else if (isStart || isEnd) cls += " drp-start";
                  else if (inRange) cls += " drp-in-range";
                  else if (isToday) cls += " drp-today";
                  return (
                    <div
                      key={ds}
                      className={cls}
                      onMouseEnter={() => step === "checkOut" && !disabled && setHoverDate(ds)}
                      onMouseLeave={() => step === "checkOut" && setHoverDate(null)}
                      onClick={() => !disabled && handleDayClick(ds)}
                    >
                      {parseInt(ds.split("-")[2])}
                    </div>
                  );
                })}
              </div>
              {(value.checkIn || value.checkOut) && (
                <button
                  onClick={() => { onChange({ checkIn: "", checkOut: "" }); setStep("checkIn"); setTempCheckIn(null); }}
                  style={{ background: "none", border: "none", cursor: "pointer", fontSize: 11, color: "#bbb", padding: "10px 0 0", display: "block", width: "100%", textAlign: "center", fontFamily: "'DM Sans', sans-serif" }}
                >Clear</button>
              )}
            </div>
          )}
        </div>
      );
    }

          }
        };
        document.addEventListener("mousedown", handler);

      // Live city search — show dropdown as user types
      useEffect(() => {
        const q = searchQuery.trim().toLowerCase();
        if (!q) { setDropdownCities([]); setShowDropdown(false); return; }
        const matches = HOTELS.filter(
          (h) =>
            h.name.toLowerCase().includes(q) ||
            h.city.toLowerCase().includes(q) ||
            h.region.toLowerCase().includes(q)
        );
        const cities = [...new Set(matches.map(h => h.city))].sort();
        setDropdownCities(cities);

        if (selectedCities.includes(city)) { setShowDropdown(false); setSearchQuery(""); return; }
        if (selectedCities.length >= 3) { setShowDropdown(false); setSearchQuery(""); return; }
        const matches = HOTELS.filter(h => h.city === city);
        setSelectedCities(prev => [...prev, city]);
        setHotelsByCityMap(prev => ({ ...prev, [city]: matches }));
        setShowDropdown(false);
        setSearchQuery("");
      };

      const removeCity = (city) => {
        setSelectedCities(prev => prev.filter(c => c !== city));
        setHotelsByCityMap(prev => { const n = {...prev}; delete n[city]; return n; });
        setSelectedHotels(prev => prev.filter(h => h.city !== city));
        setShowResults(false);

      const validDates = dateRanges.filter(

      const canCompare = selectedHotels.length >= 1 && validDates.length >= 2;

      // Compare rates
      const compareRates = () => {
        setLoading(true);
        setShowResults(false);
        setBestOverall(null);

        setTimeout(() => {
          const res = {};
          let best = null;
          selectedHotels.forEach((hotel) => {
            res[hotel.id] = {};
            validDates.forEach((dr, di) => {
              const rateData = generateRate(hotel, dr.checkIn);
              res[hotel.id][di] = rateData;
              if (rateData.available) {
                const nights = nightsBetween(dr.checkIn, dr.checkOut);
                const total = rateData.rate * nights;
                if (!best || total < best.total) {
                  best = { hotelId: hotel.id, dateIdx: di, rate: rateData.rate, total, nights };
                }
              }
            });
          });
          setResults({ ...res });
          setBestOverall(best);
          setLoading(false);
          setShowResults(true);
        }, 500);
      };

      // Calculate savings for the banner

        selectedHotels.forEach((hotel) => {

            const r = results[hotel.id]?.[di];

              const total = r.rate * nights;
              if (total > bestOverall.total && total < secondBest) {

              }
            }
          });

                { label: "Add your dates", step: 2 },
                { label: "See your savings", step: 3 },
              ].map((s, i) => (
                <React.Fragment key={i}>
                  {i > 0 && (
                    <div style={{
                      flex: 1, height: 1,
                      background: currentStep >= s.step ? "#2C1810" : "#ddd",
                      margin: "0 12px",
                      transition: "background 0.3s",
                    }} />
                  )}
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <div style={{
                      width: 24, height: 24, borderRadius: "50%",
                      background: currentStep >= s.step ? "#2C1810" : "#ddd",
                      color: currentStep >= s.step ? "#F5E6D8" : "#888",
                      display: "flex", alignItems: "center", justifyContent: "center",
                      fontSize: 11, fontWeight: 600,
                      transition: "all 0.3s",
                    }}>{s.step}</div>
                    <span style={{
                      fontSize: 12, fontWeight: 500,
                      color: currentStep >= s.step ? "#1a1a1a" : "#999",
                      transition: "color 0.3s",
                    }}>{s.label}</span>
                  </div>
                </React.Fragment>
              ))}
            </div>

            {/* ============ HOTEL SHORTLIST — unified city-grouped panel ============ */}
            {selectedCities.length > 0 && (
              <div className="fade-up" style={{
                background: "#fff", border: "1px solid #eee",
                borderRadius: 12, padding: 20, marginBottom: 16,
              }}>
                <div style={{
                  display: "flex", alignItems: "center",
                  justifyContent: "space-between", marginBottom: 16,
                }}>
                  <label style={{
                    fontSize: 11, fontWeight: 600, color: "#888",
                    letterSpacing: 1.5, textTransform: "uppercase",
                  }}>
                    {selectedCities.length > 1 ? "Multi-city shortlist" : "Hotels"}
                  </label>
                  <span style={{ fontSize: 11, color: "#aaa" }}>
                    {selectedHotels.length} of 5 selected
                  </span>
                </div>

                {selectedCities.map((city, cityIdx) => {
                  const cityHotels = hotelsByCityMap[city] || [];
                  const isLast = cityIdx === selectedCities.length - 1;
                  return (
                    <div key={city} style={{ marginBottom: isLast ? 0 : 20 }}>
                      {/* City header row */}
                      <div style={{
                        display: "flex", alignItems: "center", gap: 8,
                        marginBottom: 10,
                      }}>
                        <span style={{
                          fontSize: 13, fontWeight: 600, color: "#1a1a1a",
                        }}>{city}</span>
                        <button
                          onClick={() => removeCity(city)}
                          style={{
                            display: "flex", alignItems: "center", justifyContent: "center",
                            width: 18, height: 18, borderRadius: "50%",
                            background: "#f0ede8", border: "none",
                            cursor: "pointer", color: "#888", fontSize: 12, lineHeight: 1,
                            fontFamily: "'DM Sans', sans-serif",
                          }}
                          title={`Remove ${city}`}
                        >×</button>
                        <span style={{ fontSize: 11, color: "#bbb" }}>
                          {cityHotels.length} hotel{cityHotels.length !== 1 ? "s" : ""}
                        </span>
                      </div>

                      {/* Hotel pills */}
                      <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                        {cityHotels.map((hotel) => {
                          const isSelected = selectedHotels.find((h) => h.id === hotel.id);
                          const atMax = selectedHotels.length >= 5 && !isSelected;
                          return (
                            <div
                              key={hotel.id}
                              className="hotel-pill"
                              onClick={() => !atMax && toggleHotel(hotel)}
                              style={{
                                display: "flex", alignItems: "center", gap: 6,
                                background: isSelected ? "#FAEEDA" : atMax ? "#f9f9f7" : "#f5f5f3",
                                borderRadius: 100, padding: "7px 14px 7px 10px",
                                fontSize: 13, fontWeight: isSelected ? 600 : 400,
                                color: isSelected ? "#412402" : atMax ? "#ccc" : "#666",
                                cursor: atMax ? "not-allowed" : "pointer",
                                border: isSelected ? "1px solid #EF9F27" : "1px solid transparent",
                              }}
                            >
                              {isSelected ? (
                                <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                                  <circle cx="7" cy="7" r="6" fill="#BA7517"/>
                                  <path d="M4.5 7L6 8.5L9.5 5" stroke="white" strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round"/>
                                </svg>
                              ) : (
                                <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                                  <circle cx="7" cy="7" r="6" stroke="#ccc" strokeWidth="1"/>
                                </svg>
                              )}
                              {hotel.name}
                              <span style={{
                                fontSize: 11,
                                color: isSelected ? "#854F0B" : "#aaa",
                                fontWeight: 400,
                              }}>{"★".repeat(hotel.stars)}</span>
                            </div>
                          );
                        })}
                      </div>

                      {/* City divider */}
                      {!isLast && (
                        <div style={{ borderTop: "1px solid #f0f0f0", margin: "16px 0 0" }} />
                      )}
                    </div>
                  );
                })}

                {selectedCities.length < 3 && (
                  <p style={{
                    fontSize: 12, color: "#bbb", marginTop: 16,
                    display: "flex", alignItems: "center", gap: 4,
                  }}>
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                      <circle cx="6" cy="6" r="5" stroke="#ccc" strokeWidth="1"/>
                      <path d="M6 4v4M4 6h4" stroke="#ccc" strokeWidth="1.2" strokeLinecap="round"/>
                    </svg>
                    Search another city to compare across destinations
                  </p>
                )}
              </div>
            )}

            {/* ============ DATE RANGES ============ */}
            {selectedHotels.length > 0 && (
              <div className="fade-up" style={{
                background: "#fff", border: "1px solid #eee",
                borderRadius: 12, padding: 20, marginBottom: 16,
              }}>
                <label style={{
                  fontSize: 11, fontWeight: 600, color: "#888",
                  letterSpacing: 1.5, textTransform: "uppercase",
                  display: "block", marginBottom: 12,
                }}>Which dates could work for you?</label>

                <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                  {dateRanges.map((dr, idx) => {
                    const c = OPTION_COLORS[idx];
                    return (
                      <div key={idx} style={{
                        display: "flex", alignItems: "center", gap: 10,
                        background: "#f9f9f7", borderRadius: 8, padding: "10px 14px",
                      }}>
                        <div style={{
                          width: 10, height: 10, borderRadius: "50%",
                          background: c.dot, flexShrink: 0,
                        }} />
                        <span style={{
                          fontSize: 11, fontWeight: 600, color: "#aaa",
                          textTransform: "uppercase", letterSpacing: 1,
                          minWidth: 68, flexShrink: 0,
                        }}>Option {String.fromCharCode(65 + idx)}</span>
                        <DateRangePicker
                          value={dr}
                          onChange={(val) => updateDateRange(idx, val)}
                          minDate={new Date().toISOString().split("T")[0]}
                        />
                        {dateRanges.length > 2 && (
                          <svg
                            width="14" height="14" viewBox="0 0 14 14" fill="none"
                            style={{ cursor: "pointer", flexShrink: 0 }}
                            onClick={() => removeDateRange(idx)}
                          >
                            <path d="M3.5 3.5L10.5 10.5M10.5 3.5L3.5 10.5" stroke="#bbb" strokeWidth="1.2" strokeLinecap="round"/>
                          </svg>
                        )}
                      </div>
                    );
                  })}
                </div>

                {dateRanges.length < 10 && (
                  <button
                    onClick={addDateRange}
                    style={{
                      fontSize: 12, color: "#854F0B", cursor: "pointer",
                      background: "none", border: "none", padding: "8px 0 0",
                      fontWeight: 600, fontFamily: "'DM Sans', sans-serif",
                    }}
                  >+ Add another date range</button>
                )}
              </div>
            )}

            {/* ============ COMPARE CTA ============ */}
            {selectedHotels.length > 0 && (
              <div style={{ textAlign: "center", margin: "24px 0" }}>
                <button
                  onClick={compareRates}
                  disabled={!canCompare || loading}
                  className="btn-primary"
                  style={{
                    background: canCompare ? "#2C1810" : "#ccc",
                    color: canCompare ? "#F5E6D8" : "#888",
                    border: "none", padding: "14px 52px",
                    borderRadius: 10, fontSize: 15, fontWeight: 600,
                    fontFamily: "'DM Sans', sans-serif",
                    cursor: canCompare ? "pointer" : "not-allowed",
                    opacity: loading ? 0.7 : 1,
                  }}
                >
                  {loading ? "Scanning rates..." : "Show me the rates"}
                </button>
                {canCompare && (
                  <p style={{ fontSize: 12, color: "#aaa", marginTop: 8 }}>
                    {selectedHotels.length} hotel{selectedHotels.length > 1 ? "s" : ""} × {validDates.length} date range{validDates.length > 1 ? "s" : ""} = {selectedHotels.length * validDates.length} rate lookups
                  </p>
                )}
                {!canCompare && selectedHotels.length > 0 && (
                  <p style={{ fontSize: 12, color: "#aaa", marginTop: 8 }}>
                    {validDates.length < 2 ? "Add at least 2 date ranges to compare" : "Select at least 1 hotel"}
                  </p>
                )}
              </div>
            )}

            {/* ============ RESULTS ============ */}
            {showResults && results && (
              <div className="fade-up" style={{
                background: "#fff", border: "1px solid #eee",
                borderRadius: 12, overflow: "hidden", marginBottom: 16,
              }}>
                {/* Best deal banner */}
                {bestOverall && bestHotel && (
                  <div style={{
                    background: "#FAEEDA", padding: "16px 20px",
                    display: "flex", alignItems: "center", justifyContent: "space-between",
                    flexWrap: "wrap", gap: 12,
                  }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                        <circle cx="10" cy="10" r="9" fill="#BA7517"/>
                        <path d="M6 10L9 13L14 7" stroke="white" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                      </svg>
                      <div>
                        <p style={{ fontSize: 14, fontWeight: 600, color: "#412402", margin: 0 }}>
                          Option {String.fromCharCode(65 + bestOverall.dateIdx)} saves you {formatCurrency(calcSavings())} at {bestHotel.name}
                        </p>
                        <p style={{ fontSize: 12, color: "#854F0B", margin: "2px 0 0" }}>
                          {formatCurrency(bestOverall.rate)}/night · {formatCurrency(bestOverall.total)} for {bestOverall.nights} night{bestOverall.nights > 1 ? "s" : ""}
                        </p>
                      </div>
                    </div>
                    <a
                      href={buildBookingUrl(bestHotel, validDates[bestOverall.dateIdx].checkIn, validDates[bestOverall.dateIdx].checkOut)}
                      target="_blank"
                      rel="noopener noreferrer"
                      className="btn-primary"
                      style={{
                        background: "#2C1810", color: "#F5E6D8",
                        padding: "8px 20px", borderRadius: 8,
                        fontSize: 13, fontWeight: 600, whiteSpace: "nowrap",
                        textDecoration: "none", display: "inline-block",
                      }}
                    >Book direct</a>
                  </div>
                )}

                {/* Rate table */}
                <div style={{ overflowX: "auto" }}>
                  <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                    <thead>
                      <tr>
                        <th style={{
                          textAlign: "left", padding: "12px 16px",
                          fontWeight: 500, fontSize: 12, color: "#999",
                          borderBottom: "1px solid #eee",
                        }}>Hotel</th>
                        {validDates.map((dr, di) => {
                          const c = OPTION_COLORS[di];
                          return (
                            <th key={di} style={{
                              textAlign: "center", padding: "12px 16px",
                              fontWeight: 500, fontSize: 11,
                              borderBottom: "1px solid #eee",
                            }}>
                              <span style={{
                                display: "inline-flex", alignItems: "center", gap: 4,
                                background: c.bg, color: c.text,
                                padding: "3px 10px", borderRadius: 100,
                              }}>
                                <span style={{
                                  width: 6, height: 6, borderRadius: "50%",
                                  background: c.dot, display: "inline-block",
                                }} />
                                Option {String.fromCharCode(65 + di)} · {formatDateShort(dr.checkIn)}–{formatDateShort(dr.checkOut)}
                              </span>
                            </th>
                          );
                        })}

                      </tr>
                    </thead>
                    <tbody>
                      {selectedHotels.map((hotel) => {
                        const isBestHotel = bestOverall && hotel.id === bestOverall.hotelId;
                        return (
                          <tr key={hotel.id} className="result-row" style={{
                            borderBottom: "1px solid #f5f5f3",
                            background: isBestHotel ? "rgba(186, 117, 23, 0.03)" : "transparent",
                          }}>
                            <td style={{ padding: "14px 16px" }}>
                              <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                                <span style={{ fontWeight: 500, color: "#1a1a1a" }}>{hotel.name}</span>
                                {isBestHotel && (
                                  <span style={{
                                    fontSize: 9, fontWeight: 700, color: "#854F0B",
                                    background: "#FAEEDA", padding: "2px 6px",
                                    borderRadius: 100, letterSpacing: 0.5,
                                  }}>BEST VALUE</span>
                                )}
                              </div>
                              <p style={{ fontSize: 11, color: "#aaa", margin: "2px 0 0" }}>
                                {hotel.stars}-star · {hotel.region}
                              </p>
                            </td>
                            {validDates.map((dr, di) => {
                              const r = results[hotel.id]?.[di];
                              const isBest = bestOverall && hotel.id === bestOverall.hotelId && di === bestOverall.dateIdx;
                              const nights = nightsBetween(dr.checkIn, dr.checkOut);
                              if (!r) return <td key={di} />;
                              return (
                                <td key={di} style={{ textAlign: "center", padding: "12px 16px" }}>
                                  {r.available ? (
                                    <>
                                      <p style={{
                                        fontWeight: isBest ? 600 : 500, margin: 0,
                                        fontSize: 15,
                                        fontFamily: isBest ? "'DM Serif Display', Georgia, serif" : "inherit",
                                        color: isBest ? "#412402" : "#1a1a1a",
                                      }}>{formatCurrency(r.rate)}</p>
                                      <p style={{
                                        fontSize: 11, margin: "2px 0 6px",
                                        color: isBest ? "#854F0B" : "#aaa",
                                      }}>{formatCurrency(r.rate * nights)} total</p>
                                      <a
                                        href={buildBookingUrl(hotel, dr.checkIn, dr.checkOut)}
                                        target="_blank"
                                        rel="noopener noreferrer"
                                        className="btn-primary"
                                        style={{
                                          fontSize: 11, fontWeight: 600,
                                          padding: "4px 12px", borderRadius: 6,
                                          textDecoration: "none", display: "inline-block",
                                          background: isBest ? "#2C1810" : "#f0ede8",
                                          color: isBest ? "#F5E6D8" : "#666",
                                        }}
                                      >Book</a>
                                    </>
                                  ) : (
                                    <span style={{ fontSize: 12, color: "#ccc" }}>Sold out</span>
                                  )}
                                </td>
                              );
                            })}
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            {/* ============ HOW IT WORKS (optional section) ============ */}
            {selectedCities.length === 0 && (
              <div id="how" className="fade-up" style={{
                maxWidth: 560, margin: "40px auto 0", textAlign: "center",
              }}>
                <p style={{
                  fontSize: 11, letterSpacing: 2, color: "#aaa",
                  textTransform: "uppercase", fontWeight: 600, marginBottom: 20,
                }}>How it works</p>
                <div style={{
                  display: "grid", gridTemplateColumns: "repeat(3, minmax(0, 1fr))", gap: 16,
                }}>
                  {[
                    { num: "1", title: "Pick your hotels", desc: "Search any destination and select up to 5 hotels you're considering." },
                    { num: "2", title: "Add your dates", desc: "Enter 2 or more date ranges you'd be flexible with." },
                    { num: "3", title: "Book the best rate", desc: "See which combination is cheapest, then book direct with the hotel." },
                  ].map((step) => (
                    <div key={step.num} style={{ padding: "0 4px" }}>
                      <div style={{
                        width: 32, height: 32, borderRadius: "50%",
                        background: "#FAEEDA", color: "#854F0B",
                        display: "flex", alignItems: "center", justifyContent: "center",
                        fontSize: 13, fontWeight: 700, margin: "0 auto 10px",
                      }}>{step.num}</div>
                      <p style={{ fontSize: 13, fontWeight: 600, margin: "0 0 4px", color: "#1a1a1a" }}>{step.title}</p>
                      <p style={{ fontSize: 12, color: "#888", lineHeight: 1.5, margin: 0 }}>{step.desc}</p>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* ============ FOOTER ============ */}
            <div style={{ textAlign: "center", padding: "32px 0 0" }}>
              <p style={{ fontSize: 11, color: "#aaa", margin: 0 }}>
                Rates are estimated for demo purposes. "Book direct" links to the hotel's official website.
              </p>
              <p style={{ fontSize: 11, color: "#aaa", margin: "4px 0 0" }}>
                Built by Paul Totah · <a href="https://www.linkedin.com/in/paultotah/" target="_blank" rel="noopener noreferrer" style={{ textDecoration: "underline", color: "#888" }}>LinkedIn</a>
              </p>
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById("root"));
  </script>
</body>
</html>
