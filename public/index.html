<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hotel Rate Scanner & Price Alerts</title>
  <meta name="description" content="Search by hotel, destination, or dates to compare live rates across hotel and OTA platforms. Set a price alert after results load if the rate is not aligned with your budget. A tool from Seven Feet Travel." />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="hotels.js"></script>
  <script src="proper-azds.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;0,700;1,300;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ── DESIGN SYSTEM TOKENS ────────────────────────────── */
    :root {
      --font-serif:             'Cormorant Garamond', Georgia, serif;
      --font-sans:              'Inter', system-ui, sans-serif;

      --background:             hsl(40, 20%, 97%);
      --foreground:             hsl(220, 20%, 14%);
      --card:                   hsl(40, 15%, 99%);
      --card-foreground:        hsl(220, 20%, 14%);
      --primary:                hsl(220, 18%, 22%);
      --primary-foreground:     hsl(40, 20%, 97%);
      --secondary:              hsl(38, 12%, 92%);
      --secondary-foreground:   hsl(220, 18%, 22%);
      --muted:                  hsl(40, 10%, 94%);
      --muted-foreground:       hsl(220, 10%, 40%);
      --accent:                 hsl(32, 30%, 52%);
      --accent-foreground:      hsl(40, 20%, 97%);
      --destructive:            hsl(0, 60%, 50%);
      --destructive-foreground: hsl(0, 0%, 100%);
      --border:                 hsl(38, 15%, 88%);
      --input:                  hsl(38, 15%, 88%);
      --ring:                   hsl(220, 18%, 22%);
      --radius:                 0.5rem;
      --shadow-card:            0 10px 30px -10px rgba(0, 0, 0, 0.03);

      /* ── Legacy aliases (used throughout component CSS) ── */
      --bg:              var(--background);
      --surface:         var(--card);
      --surface-2:       var(--muted);
      --border-strong:   hsl(38, 15%, 74%);
      --text-1:          var(--foreground);
      --text-2:          var(--muted-foreground);
      --text-3:          hsl(220, 10%, 48%);
      --ink:             var(--primary);
      --gold:            var(--accent);
      --gold-light:      hsl(32, 36%, 62%);
      --gold-bg:         hsl(32, 40%, 96%);
      --gold-border:     hsl(32, 30%, 80%);
      --green:           hsl(152, 44%, 30%);
      --green-bg:        hsl(152, 44%, 95%);
      --red:             var(--destructive);
      --red-bg:          hsl(0, 60%, 97%);
      --radius-sm:       calc(var(--radius) * 0.5);
      --radius-md:       var(--radius);
      --radius-lg:       calc(var(--radius) * 1.5);
      --radius-xl:       calc(var(--radius) * 2);
      --radius-pill:     9999px;
      --shadow-sm:       0 1px 3px rgba(0,0,0,0.04);
      --shadow-md:       var(--shadow-card);
      --shadow-lg:       0 20px 48px -12px rgba(0,0,0,0.14);
      --transition:      0.15s ease;
    }

    /* ── RESET ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }
    body {
      font-family: var(--font-sans);
      font-weight: 400;
      background: var(--background);
      color: var(--foreground);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      line-height: 1.5;
    }
    h1, h2, h3, h4, h5, h6 { font-family: var(--font-serif); }
    a { color: inherit; text-decoration: none; }
    button { font-family: var(--font-sans); cursor: pointer; border: none; background: none; padding: 0; }
    input { font-family: var(--font-sans); }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: var(--radius-pill); }

    /* ── LAYOUT ──────────────────────────────────────────── */
    .page { min-height: 100vh; }
    .container { max-width: 1040px; margin: 0 auto; padding: 0 24px; }

    /* ── NAV ─────────────────────────────────────────────── */
    .hero-section-wrap { position: relative; }
    .nav {
      position: sticky; top: 0; z-index: 200;
      background: rgba(250,249,246,0.82);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(210,205,196,0.5);
    }
    .nav-inner {
      max-width: 1040px; margin: 0 auto; padding: 0 24px;
      height: 56px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo {
      font-family: var(--font-serif);
      font-size: 20px; font-weight: 500;
      color: var(--text-1);
    }
    .nav-logo-sub { font-family: var(--font-serif); font-size: 16px; font-weight: 400; color: #ffffff; margin-left: 8px; text-decoration: none; }
    .nav-logo-sub:hover { color: #ffffff; }
    .nav-right { display: flex; align-items: center; gap: 4px; }
    .nav-link {
      font-size: 14px; font-weight: 500; color: var(--text-2);
      padding: 5px 12px; border-radius: var(--radius-pill);
      border: none; background: none; cursor: pointer;
      transition: all var(--transition); font-family: var(--font-sans);
    }
    .nav-link:hover { background: rgba(0,0,0,0.05); color: var(--text-1); }
    .nav-badge {
      font-size: 10px; font-weight: 500;
      letter-spacing: 0.04em;
      color: var(--text-3);
      border-radius: var(--radius-pill);
      padding: 3px 8px;
      border: 1px solid var(--border);
    }

    /* ── HERO WRAP — full-bleed image + overlay ──────────── */
    .hero-section-wrap {
      background:
        linear-gradient(rgba(20,22,32,0.55), rgba(20,22,32,0.55)),
        url('hero-travel.jpg')
        center/cover no-repeat;
      overflow: visible;
    }

    /* ── HERO ────────────────────────────────────────────── */
    .hero {
      padding: 88px 24px 80px;
      text-align: center;
      max-width: 600px;
      margin: 0 auto;
      position: relative; z-index: 1;
    }
    .hero-eyebrow {
      display: none;
      font-size: 12px; font-weight: 500;
      letter-spacing: 0.25em; text-transform: uppercase;
      color: rgba(255,255,255,0.85); margin-bottom: 20px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.4);
    }
    .hero-headline {
      font-family: var(--font-serif);
      font-size: clamp(24px, 3.2vw, 36px);
      font-weight: 500;
      line-height: 1.12; letter-spacing: -0.01em;
      color: #fff; margin-bottom: 18px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.4);
    }
    .hero-headline em { font-style: italic; color: rgba(255,255,255,0.88); }
    .hero-nowrap { white-space: nowrap; }
    .hero-value {
      font-size: 17px; font-weight: 400;
      color: rgba(255,255,255,0.90); line-height: 1.6;
      margin-bottom: 8px; max-width: 540px; margin-left: auto; margin-right: auto;
      text-shadow: 0 1px 3px rgba(0,0,0,0.4);
    }
    .hero-note {
      font-size: 13px; color: rgba(255,255,255,0.75);
      text-shadow: 0 1px 3px rgba(0,0,0,0.4);
    }
    /* ── MAIN CARD ───────────────────────────────────────── */
    .main-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: 0 10px 30px -10px rgba(0,0,0,0.12), 0 1px 4px rgba(0,0,0,0.04);
      overflow: visible;
      margin-top: -48px;
      margin-bottom: 40px;
      position: relative; z-index: 10;
      animation: cardEntrance 0.6s ease-out both;
    }
    @keyframes cardEntrance {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .main-card-section {
      padding: 32px 40px;
      border-bottom: 1px solid var(--border);
    }
    .main-card-section:last-child { border-bottom: none; }

    /* Steps 1 + 2 — row vs column layout (toggle in UI) */
    .step-layout-bar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 14px 40px 0;
    }
    .step-layout-group {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }
    .step-layout-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-2);
    }
    .step-layout-toggle {
      display: inline-flex;
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      overflow: hidden;
      background: var(--surface-2);
    }
    .step-layout-btn {
      font-family: var(--font-sans);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.06em;
      padding: 7px 14px;
      color: var(--text-2);
      transition: all var(--transition);
    }
    .step-layout-btn:hover { color: var(--text-1); }
    .step-layout-btn.on {
      background: var(--ink);
      color: var(--primary-foreground);
    }

    .main-card-steps {
      display: grid;
      align-items: start;
    }
    .main-card-steps.layout-rows {
      grid-template-columns: 1fr;
    }
    .main-card-steps.layout-rows .main-card-section--hotels {
      border-right: none;
      border-bottom: 1px solid var(--border);
    }
    .main-card-steps.layout-columns {
      grid-template-columns: 1fr 1fr;
    }
    .main-card-steps.layout-columns .main-card-section--hotels {
      border-right: 1px solid var(--border);
      border-bottom: none;
    }
    .main-card-steps .main-card-section {
      border-bottom: none;
      min-width: 0;
    }
    .main-card-steps.layout-columns .section-label {
      flex-wrap: wrap;
    }
    .main-card-steps.layout-columns .section-subtitle {
      width: 100%;
      margin-left: 32px;
      margin-top: -8px;
    }
    @media (min-width: 821px) {
      .main-card-steps.layout-columns .city-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      .main-card-steps.layout-columns .date-row {
        padding: 0 10px;
      }
      .main-card-steps.layout-columns .drp-trigger-text {
        font-size: 13px;
      }
      .main-card-steps.layout-columns .main-card-section {
        padding: 28px 24px;
      }
    }

    /* ── SECTION LABELS ──────────────────────────────────── */
    .section-label {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 16px;
    }
    .section-num {
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--ink); color: white;
      font-size: 10px; font-weight: 700;
      display: inline-flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .section-title {
      font-size: 13px; font-weight: 600;
      letter-spacing: 0.01em;
      color: var(--text-1);
    }
    .section-subtitle {
      font-size: 12px; color: var(--text-3);
      margin-left: auto;
    }

    /* ── HOTEL SEARCH ────────────────────────────────────── */
    .search-wrap { position: relative; }
    .search-box-wrap { width: 100%; min-width: 0; }
    .search-box {
      display: flex; align-items: center; gap: 10px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-md); padding: 0 14px;
      min-height: 48px;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .search-box:focus-within {
      border-color: var(--ink);
      box-shadow: 0 0 0 3px hsla(220,18%,22%,0.10);
    }
    .search-box-icon { color: var(--text-3); flex-shrink: 0; line-height: 1; }
    .search-box input {
      flex: 1 1 8rem; min-width: 0; width: 100%;
      border: none; outline: none;
      font-size: 14px; font-weight: 400; background: transparent; color: var(--text-1);
    }
    .search-box input::placeholder { color: var(--text-2); opacity: 1; }
    .search-meta {
      font-size: 12px; font-weight: 500; color: var(--text-2);
      margin-top: 6px; padding-left: 2px;
    }

    .search-dropdown {
      position: absolute; top: calc(100% + 6px); left: 0; right: 0;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-md); box-shadow: var(--shadow-lg);
      z-index: 300;
      max-height: 360px;
      overflow-x: hidden;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #B8B0A4 transparent;
      animation: slideDown 0.18s ease-out;
    }
    .search-dropdown::-webkit-scrollbar { width: 8px; }
    .search-dropdown::-webkit-scrollbar-thumb {
      background: #C8C0B4;
      border-radius: 4px;
    }
    .search-item {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 16px; cursor: pointer;
      transition: background var(--transition);
      border-bottom: 1px solid var(--border);
    }
    .search-item:last-child { border-bottom: none; }
    .search-item:hover, .search-item.active { background: var(--surface-2); }
    .search-item-icon {
      width: 34px; height: 34px; border-radius: var(--radius-sm);
      background: var(--surface-2); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; flex-shrink: 0;
    }
    .search-item-body { flex: 1; min-width: 0; }
    .search-item-name { font-size: 14px; font-weight: 500; color: var(--text-1); }
    .search-item-meta { font-size: 12px; color: var(--text-3); margin-top: 1px; }
    .search-item-stars { font-size: 12px; flex-shrink: 0; }
    .search-no-results { padding: 18px 16px; font-size: 13px; color: var(--text-3); text-align: center; }

    /* ── HOTEL CHIPS ─────────────────────────────────────── */
    .hotel-tray {
      display: flex; flex-wrap: wrap; gap: 8px;
      margin-top: 14px;
    }
    .hotel-chip {
      display: inline-flex; align-items: center; gap: 7px;
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--radius-pill); padding: 6px 6px 6px 12px;
      font-size: 13px; font-weight: 500; color: var(--text-1);
      box-shadow: var(--shadow-sm);
      animation: fadeIn 0.2s ease-out;
    }
    .hotel-chip-city { font-weight: 400; color: var(--text-3); font-size: 12px; }
    .hotel-chip-rm {
      width: 20px; height: 20px; border-radius: 50%;
      background: var(--surface-2); border: 1px solid var(--border);
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 11px; color: var(--text-2); cursor: pointer;
      transition: all var(--transition); line-height: 1;
    }
    .hotel-chip-rm:hover { background: var(--red-bg); color: var(--red); border-color: var(--red-bg); }
    .tray-note { font-size: 12px; color: var(--text-3); margin-top: 10px; }

    /* ── DATE ROWS ───────────────────────────────────────── */
    .date-rows { display: flex; flex-direction: column; gap: 8px; }
    .date-row {
      display: flex; align-items: center; gap: 10px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-md); padding: 0 14px;
      height: 48px;
      transition: border-color var(--transition);
    }
    .date-row:focus-within { border-color: var(--border-strong); }
    .date-row-letter {
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--text-3); width: 20px; text-align: center; flex-shrink: 0;
      text-transform: uppercase;
    }
    .date-row-divider { color: var(--border); font-size: 16px; flex-shrink: 0; }
    .date-row-nights {
      font-size: 11px; font-weight: 600;
      color: var(--text-2); background: var(--surface-2);
      border-radius: var(--radius-pill); padding: 3px 9px;
      flex-shrink: 0; white-space: nowrap;
    }
    .date-row-nights.empty { opacity: 0; }
    .date-row-rm {
      width: 26px; height: 26px; border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-3); cursor: pointer; flex-shrink: 0;
      transition: all var(--transition); font-size: 16px; line-height: 1;
    }
    .date-row-rm:hover { background: var(--red-bg); color: var(--red); }
    .date-row-rm.hidden { opacity: 0; pointer-events: none; }

    /* ── DATE PICKER TRIGGER ─────────────────────────────── */
    .drp-wrap { position: relative; flex: 1; min-width: 0; }
    .drp-trigger {
      display: flex; align-items: center; gap: 6px;
      font-size: 14px; cursor: pointer; color: var(--text-1);
      padding: 2px 0;
    }
    .drp-trigger.empty { color: var(--text-3); }
    .drp-trigger-icon { font-size: 13px; color: var(--text-3); flex-shrink: 0; line-height: 1; }
    .drp-trigger-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── DATE PICKER CALENDAR ────────────────────────────── */
    .drp-cal {
      position: absolute; top: calc(100% + 8px); left: 0;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); box-shadow: var(--shadow-lg);
      z-index: 400; padding: 16px; min-width: 272px;
      animation: slideDown 0.18s ease-out;
    }
    .drp-cal-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .drp-cal-month { font-size: 14px; font-weight: 600; color: var(--text-1); }
    .drp-cal-nav {
      width: 28px; height: 28px; border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background var(--transition);
      font-size: 14px; color: var(--text-2);
    }
    .drp-cal-nav:hover { background: var(--surface-2); }
    .drp-wdays {
      display: grid; grid-template-columns: repeat(7,1fr);
      gap: 2px; margin-bottom: 4px;
    }
    .drp-wday {
      text-align: center; font-size: 10px; font-weight: 600;
      letter-spacing: 0.05em; text-transform: uppercase;
      color: var(--text-3); padding: 3px 0;
    }
    .drp-days { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; }
    .drp-day {
      text-align: center; padding: 7px 2px; border-radius: var(--radius-sm);
      font-size: 12px; cursor: pointer; transition: background 0.1s;
    }
    .drp-day:hover:not(.drp-disabled) { background: var(--surface-2); }
    .drp-day.drp-disabled { color: var(--text-3); cursor: not-allowed; }
    .drp-day.drp-start, .drp-day.drp-end {
      background: var(--ink) !important; color: #fff !important; font-weight: 700;
    }
    .drp-day.drp-in-range { background: var(--surface-2); color: var(--text-2); }
    .drp-day.drp-today { outline: 1.5px solid var(--border); outline-offset: -1px; }
    .drp-hint {
      font-size: 11px; color: var(--text-3); text-align: center;
      margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border);
    }
    .drp-clear {
      display: block; width: 100%; text-align: center;
      font-size: 12px; color: var(--text-3); cursor: pointer;
      margin-top: 6px; transition: color var(--transition);
    }
    .drp-clear:hover { color: var(--text-2); }

    /* ── ADD DATE BUTTON ─────────────────────────────────── */
    .add-date-btn {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; font-weight: 500; color: var(--text-2);
      padding: 9px 14px; border-radius: var(--radius-md);
      border: 1.5px dashed var(--border);
      transition: all var(--transition); margin-top: 4px;
    }
    .add-date-btn:hover { border-color: var(--border-strong); color: var(--text-1); background: var(--surface); }
    .add-date-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── CTA ─────────────────────────────────────────────── */
    .cta-wrap { padding: 28px 40px; }
    .cta-inner {
      display: flex; align-items: center; gap: 20px;
      flex-wrap: wrap;
    }
    .compare-btn {
      flex: 1; min-width: 200px;
      background: var(--ink); color: hsl(40, 20%, 97%);
      font-size: 15px; font-weight: 600;
      height: 48px; padding: 0 28px; border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: all var(--transition);
    }
    .compare-btn:hover:not(:disabled) { opacity: 0.90; transform: translateY(-1px); box-shadow: var(--shadow-md); }
    .compare-btn:active:not(:disabled) { transform: translateY(0); }
    .compare-btn:disabled { background: var(--surface-2); color: var(--text-3); cursor: not-allowed; opacity: 0.4; }
    .cta-checklist { display: flex; flex-direction: column; gap: 5px; }
    .cta-req { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--text-3); }
    .cta-dot {
      width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
      border: 1.5px solid var(--border);
    }
    .cta-dot.met { background: var(--green); border-color: var(--green); }

    /* ── RESULTS ─────────────────────────────────────────── */
    .results-section { margin-bottom: 48px; }

    /* Summary Cards */
    .summary-cards {
      display: grid; grid-template-columns: repeat(3,1fr); gap: 12px;
      margin-bottom: 24px; animation: fadeUp 0.3s ease-out;
    }
    .scard {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--radius-lg); padding: 18px 20px;
      box-shadow: var(--shadow-sm);
    }
    .scard.best { border-color: var(--gold-border); background: var(--gold-bg); }
    .scard-label {
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.09em; text-transform: uppercase;
      color: var(--text-3); margin-bottom: 10px;
    }
    .scard.best .scard-label { color: var(--gold); }
    .scard-value {
      font-size: 24px; font-weight: 600; letter-spacing: -0.02em;
      color: var(--text-1); line-height: 1.1; margin-bottom: 4px;
      font-variant-numeric: tabular-nums;
    }
    .scard-meta { font-size: 12px; color: var(--text-2); line-height: 1.5; }

    /* Table shell */
    .results-table-card {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--radius-lg); box-shadow: var(--shadow-sm);
      overflow: hidden; animation: fadeUp 0.35s ease-out;
    }
    .rtc-toolbar {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 12px;
      padding: 12px 20px; border-bottom: 1px solid var(--border);
      background: var(--surface-2);
    }
    .rtc-toolbar-label { font-size: 12px; font-weight: 600; color: var(--text-2); flex: none; min-width: 0; }
    .rtc-toolbar-note {
      padding: 6px 20px 10px;
      font-size: 11px;
      line-height: 1.4;
      color: #8A8A8A;
      background: var(--surface-2);
      border-bottom: 1px solid var(--border);
    }
    .sort-label { font-size: 12px; font-weight: 600; color: #3D3D3D; }
    .sort-btns { display: flex; gap: 4px; }
    .sort-btn {
      font-size: 11px; font-weight: 500; color: var(--text-2);
      padding: 4px 10px; border-radius: var(--radius-pill);
      border: 1px solid var(--border); background: var(--surface);
      transition: all var(--transition); cursor: pointer;
    }
    .sort-btn.on { background: var(--ink); color: white; border-color: var(--ink); }

    /* Table */
    .rt { width: 100%; border-collapse: collapse; }
    .rt th {
      padding: 11px 16px;
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.07em; text-transform: uppercase;
      color: var(--text-3); background: var(--surface-2);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    .rt th:first-child { text-align: left; }
    .rt th.date-th { text-align: center; min-width: 130px; }
    .rt td { border-bottom: 1px solid var(--border); vertical-align: middle; padding: 0; }
    .rt tr:last-child td { border-bottom: none; }
    .rt tr:hover .hotel-td { background: rgba(0,0,0,0.012); }

    .hotel-td { padding: 16px; min-width: 180px; max-width: 200px; }
    .hotel-td-name { font-size: 14px; font-weight: 600; color: var(--text-1); line-height: 1.3; }
    .hotel-td-city { font-size: 12px; color: var(--text-3); margin-top: 3px; }
    .hotel-td-stars { font-size: 11px; margin-top: 4px; }

    .rate-td {
      padding: 14px 12px; text-align: center;
      position: relative; min-width: 130px;
      min-height: 132px; box-sizing: border-box;
      display: flex; flex-direction: column; align-items: center;
      justify-content: flex-start; gap: 0;
      transition: background var(--transition);
    }
    .rate-td.best { background: var(--gold-bg); }
    .rate-td-badge-slot {
      min-height: 26px; width: 100%;
      display: flex; align-items: flex-start; justify-content: center;
      flex-shrink: 0;
    }
    .rate-td-main {
      flex: 1; width: 100%;
      display: flex; flex-direction: column; align-items: center; gap: 2px;
    }
    .rate-td-actions {
      width: 100%; margin-top: auto; padding-top: 8px;
      display: flex; justify-content: center; flex-shrink: 0;
    }
    .best-badge {
      display: inline-flex; align-items: center; gap: 3px;
      font-size: 9px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--gold); background: white;
      border: 1px solid var(--gold-border); border-radius: var(--radius-pill);
      padding: 2px 7px;
    }
    .rate-adr {
      font-size: 17px; font-weight: 600; letter-spacing: -0.01em;
      color: var(--text-1); font-variant-numeric: tabular-nums;
    }
    .rate-disclaimer { font-size: 9px; color: #9C9C9C; line-height: 1.3; margin-top: 4px; max-width: 118px; }
    .rate-unverified-msg {
      font-size: 11px;
      color: #5C5C5C;
      line-height: 1.4;
      max-width: 118px;
      text-align: center;
    }
    .rate-source-tag { font-size: 9px; color: #6B5A3E; font-weight: 600; margin-top: 2px; letter-spacing: 0.02em; }
    .currency-control {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px 14px;
      margin-bottom: 14px;
      padding: 12px 14px;
      background: #FAFAF8;
      border: 1px solid #E8E4DC;
      border-radius: 10px;
    }
    .currency-control--inline {
      display: flex;
      flex-wrap: nowrap;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin: 0;
      padding: 0;
      width: 100%;
      background: transparent;
      border: none;
      border-radius: 0;
    }
    .rtc-toolbar-sort {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      width: 100%;
    }
    .rtc-toolbar .sort-label { margin-left: 0; flex-shrink: 0; }
    .currency-control-label { font-size: 12px; font-weight: 600; color: #3D3D3D; }
    .currency-toggle {
      display: inline-flex;
      gap: 4px;
      border: none;
      border-radius: 0;
      overflow: visible;
      background: transparent;
    }
    .currency-toggle-btn {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-2);
      padding: 4px 10px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border);
      background: var(--surface);
      transition: all var(--transition);
      cursor: pointer;
    }
    .currency-toggle-btn.on {
      background: var(--ink);
      color: white;
      border-color: var(--ink);
    }
    .currency-control-note {
      flex: 1 1 100%;
      margin: 0;
      font-size: 11px;
      line-height: 1.4;
      color: #8A8A8A;
    }
    .rate-nights { font-size: 11px; color: var(--text-3); }
    .rate-book {
      display: inline-flex; align-items: center; justify-content: center; gap: 4px;
      font-size: 12px; font-weight: 600;
      padding: 5px 12px; border-radius: var(--radius-pill);
      border: 1.5px solid var(--border); color: var(--text-1);
      background: white; transition: all var(--transition); cursor: pointer;
      white-space: nowrap;
    }
    .rate-book:hover { background: var(--ink); color: white; border-color: var(--ink); }
    .rate-book.gold { border-color: var(--gold-border); color: var(--gold); background: white; }
    .rate-book.gold:hover { background: var(--gold-light); color: white; border-color: var(--gold-light); }
    .rate-unavail { font-size: 12px; color: var(--text-3); }
    .recents-header {
      padding: 8px 16px 4px;
      font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text-3); background: var(--surface-2);
      border-bottom: 1px solid var(--border);
    }
    .recents-section { border-bottom: 1px solid var(--border); }

    /* Skeleton loading */
    .skel {
      background: linear-gradient(90deg, var(--surface-2) 25%, var(--border) 50%, var(--surface-2) 75%);
      background-size: 200% 100%; border-radius: var(--radius-sm);
      animation: shimmer 1.5s infinite;
      display: block; margin: 0 auto;
    }
    .skel-r { width: 60px; height: 18px; }
    .skel-t { width: 48px; height: 11px; margin-top: 6px; }
    .skel-b { width: 54px; height: 24px; border-radius: var(--radius-pill); margin-top: 10px; }

    /* ── DISCLOSURE ──────────────────────────────────────── */
    .disclosure {
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 22px 24px;
      margin-bottom: 48px;
    }
    .disclosure-title {
      font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text-3); margin-bottom: 10px;
    }
    .disclosure p {
      font-size: 13px; color: var(--text-2); line-height: 1.7;
      margin-bottom: 6px;
    }
    .disclosure p:last-child { margin-bottom: 0; }

    /* ── WHY BUILT ───────────────────────────────────────── */
    .why-section {
      border-top: 1px solid var(--border);
      padding: 52px 0 64px;
    }
    .why-eyebrow {
      font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-3); margin-bottom: 14px;
    }
    .why-headline {
      font-family: var(--font-serif);
      font-size: clamp(22px, 3vw, 28px); letter-spacing: -0.02em;
      color: var(--text-1); margin-bottom: 28px; max-width: 500px;
    }
    .why-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 20px; }
    .why-card {
      padding: 20px; background: var(--surface);
      border-radius: var(--radius-lg); border: 1px solid var(--border);
    }
    .why-card-tag {
      font-size: 10px; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase;
      color: var(--text-3); margin-bottom: 10px;
    }
    .why-card-text { font-size: 13px; color: var(--text-2); line-height: 1.72; }

    /* ── FOOTER ──────────────────────────────────────────── */
    .footer {
      border-top: 1px solid var(--border);
      padding: 28px 24px;
      display: flex; align-items: center; justify-content: center;
    }
    .footer-author {
      font-family: var(--font-sans); font-size: 14px; color: var(--text-2);
    }
    .footer-a {
      color: var(--text-2);
      text-decoration: underline; text-underline-offset: 4px;
      transition: color var(--transition);
    }
    .footer-a:hover { color: var(--text-1); }
    .footer-note-btn {
      border: none;
      background: transparent;
      color: var(--text-2);
      cursor: pointer;
      font-family: var(--font-sans);
      font-size: 13px;
      text-decoration: underline;
      text-underline-offset: 4px;
      transition: color var(--transition);
    }

    /* Legacy classes kept for safety */
    .footer-disclaimer { display: none; }
    .footer-divider { display: none; }
    .footer-link { display: none; }
    .footer-about-mobile { display: none; }
    .footer-about-btn {
      background: none; border: none; padding: 0;
      font-family: var(--font-sans); font-size: 13px;
      color: var(--text-2); cursor: pointer;
      text-decoration: underline; text-underline-offset: 3px;
    }

    /* ── ANIMATIONS ──────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .spinner {
      width: 16px; height: 16px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    /* ── SEARCH HELPER / DROPDOWN FOOTER ────────────────── */
    .search-helper {
      font-size: 12px; font-weight: 400; color: var(--text-2);
      margin-top: 8px; line-height: 1.45;
    }
    .search-dropdown-footer {
      padding: 8px 16px; font-size: 11px; color: var(--text-3);
      border-top: 1px solid var(--border); background: var(--surface-2);
      text-align: center;
    }

    /* ── CITY BROWSE ─────────────────────────────────────── */
    /* Inline panel — expands inside the card, no absolute positioning */
    .search-browse-panel {
      margin-top: 10px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--surface);
      overflow: hidden;
      animation: fadeUp 0.16s ease-out;
    }
    .city-browse-header {
      padding: 10px 16px 8px;
      font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text-3); border-bottom: 1px solid var(--border);
      background: var(--surface-2);
    }
    .city-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 1px; padding: 6px; background: var(--border);
    }
    .city-grid-inner {
      display: contents;
    }
    .city-btn {
      display: flex; flex-direction: column; align-items: flex-start;
      padding: 11px 13px; border-radius: var(--radius-sm);
      background: var(--surface); border: none; cursor: pointer;
      text-align: left; font-family: var(--font-sans);
      transition: background var(--transition);
    }
    .city-btn:hover { background: var(--gold-bg); }
    .city-btn-name { font-size: 13px; font-weight: 500; color: var(--text-1); line-height: 1.3; }
    .city-count {
      font-size: 11px; color: var(--text-3); font-weight: 400; margin-top: 3px;
    }
    .city-back-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 11px 16px; font-size: 13px; font-weight: 600; color: var(--text-2);
      border-bottom: 1px solid var(--border); cursor: pointer;
      transition: color var(--transition); background: var(--surface-2);
    }
    .city-back-btn:hover { color: var(--text-1); }
    /* Hotel list inside browse panel — max height with scroll */
    .city-hotel-list { max-height: 280px; overflow-y: auto; }

    /* ── SUMMARY CARDS — interactive ────────────────────── */
    .scard-clickable {
      cursor: pointer; transition: all var(--transition);
    }
    .scard-clickable:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .scard-action {
      font-size: 11px; color: var(--text-3); margin-top: 8px;
      letter-spacing: 0.01em;
    }
    .scard-clickable:hover .scard-action { color: var(--text-2); }

    /* ── TABLE CELL HIGHLIGHT ────────────────────────────── */
    @keyframes cell-highlight {
      0%   { box-shadow: inset 0 0 0 3px var(--gold), 0 0 20px rgba(176,125,46,0.25); background-color: rgba(176,125,46,0.14); }
      40%  { box-shadow: inset 0 0 0 3px var(--gold-light), 0 0 10px rgba(176,125,46,0.12); background-color: rgba(176,125,46,0.08); }
      100% { box-shadow: inset 0 0 0 0 transparent, 0 0 0 transparent; background-color: transparent; }
    }
    .rate-td.highlighted {
      animation: cell-highlight 2.4s ease-out forwards;
      position: relative; z-index: 1;
    }

    /* ── MODAL ───────────────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(26,26,26,0.45);
      backdrop-filter: blur(4px);
      display: flex; align-items: flex-end; justify-content: center;
      animation: fadeIn 0.18s ease-out;
    }
    @media (min-width: 600px) { .modal-overlay { align-items: center; } }
    .modal-panel {
      background: var(--surface); width: 100%; max-width: 620px;
      border-radius: var(--radius-xl) var(--radius-xl) 0 0;
      box-shadow: var(--shadow-lg); max-height: 85vh; overflow-y: auto;
      animation: slideUp 0.22s ease-out;
    }
    @media (min-width: 600px) {
      .modal-panel {
        border-radius: var(--radius-xl);
        max-height: 80vh;
      }
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 24px 16px; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; background: var(--surface);
    }
    .modal-title {
      font-family: var(--font-serif); font-size: 20px; letter-spacing: -0.02em;
      color: var(--text-1);
    }
    .modal-close {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--surface-2); border: 1px solid var(--border);
      font-size: 18px; color: var(--text-2); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all var(--transition); font-family: var(--font-sans);
    }
    .modal-close:hover { background: var(--border); color: var(--text-1); }
    .modal-body { padding: 24px; }
    .modal-body p {
      font-size: 14px; color: var(--text-2); line-height: 1.7;
      margin-bottom: 12px;
    }
    .modal-body p:last-child { margin-bottom: 0; }
    .modal-grid {
      display: grid; gap: 16px;
      grid-template-columns: 1fr;
    }
    .modal-card {
      padding: 18px; background: var(--surface-2);
      border-radius: var(--radius-lg); border: 1px solid var(--border);
    }
    .modal-section-label {
      font-size: 11px; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase;
      color: var(--text-3); margin-bottom: 12px;
    }
    .modal-card-tag {
      font-size: 10px; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase;
      color: var(--text-3); margin-bottom: 8px;
    }
    .modal-card-text { font-size: 13px; color: var(--text-2); line-height: 1.7; }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .usage-notice {
      margin: 0 0 16px;
      padding: 14px 16px;
      border: 1px solid #E8D6A8;
      border-radius: 14px;
      background: #FFF8E6;
      color: #6F4E00;
      font-size: 13px;
      line-height: 1.5;
    }

    /* ── RESPONSIVE ──────────────────────────────────────── */
    /* Side-by-side stays 2 columns on mobile; stacked uses layout-rows (1 column). */
    @media (max-width: 820px) {
      .main-card-steps.layout-columns {
        grid-template-columns: 1fr 1fr;
      }
      .main-card-steps.layout-columns .main-card-section {
        padding: 20px 14px;
      }
      .main-card-steps.layout-columns .main-card-section--hotels {
        border-right: 1px solid var(--border);
        border-bottom: none;
      }
      .main-card-steps.layout-columns .section-subtitle {
        width: 100%;
        margin-left: 0;
        margin-top: -6px;
        font-size: 11px;
        line-height: 1.35;
      }
      .main-card-steps.layout-columns .section-label {
        font-size: 13px;
        gap: 8px;
      }
      .main-card-steps.layout-columns .city-grid {
        grid-template-columns: 1fr;
      }
      .main-card-steps.layout-columns .date-row {
        padding: 0 4px;
      }
      .main-card-steps.layout-columns .drp-trigger-text {
        font-size: 12px;
      }
    }
    @media (max-width: 620px) {
      .summary-cards { grid-template-columns: 1fr; }
      .why-grid { grid-template-columns: 1fr; gap: 12px; }
      .step-layout-bar { padding: 12px 20px 0; }
      .main-card-section, .cta-wrap { padding: 20px 20px; }
      /* Nav — single-line logo only, hide sub-brand/badge/about */
      .nav-inner { padding: 0 16px; }
      .nav-logo { font-size: 15px; }
      .nav-logo-sub { display: none; }
      .nav-badge { display: none; }
      .nav-link { display: none; }
      /* Hero — tighten spacing */
      .hero-nowrap { white-space: normal; }
      .hero { padding: 44px 20px 48px; }
      .hero-headline { font-size: clamp(26px, 7vw, 38px); line-height: 1.15; }
      .hero-value { font-size: 15px; }
      .hero-note { font-size: 12px; }
      .main-card { margin-top: -24px; }
      .city-grid { grid-template-columns: repeat(2, 1fr); background: var(--border); }
    }

    /* ── MOBILE RESULTS MATRIX ───────────────────────────── */
    .rtc-toolbar-controls {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 10px;
      width: 100%;
    }
    .rt-scroll-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .results-table-desktop { display: block; }
    .results-matrix-mobile { display: none; }

    @media (max-width: 768px) {
      /* iOS Safari zooms when an input is focused below 16px */
      .search-box input,
      input,
      select,
      textarea {
        font-size: 16px;
      }
      .results-section { margin-bottom: 32px; }
      .step-layout-bar { display: none; }
      .rtc-toolbar {
        padding: 12px 14px;
      }
      .rtc-toolbar-label {
        flex: none;
        min-width: 0;
      }
      .rtc-toolbar-controls {
        gap: 10px;
      }
      .rtc-toolbar-sort {
        padding-top: 10px;
        margin-top: 0;
        border-top: 1px solid var(--border);
      }
      .rtc-toolbar-sort .sort-label { margin-left: 0; }
      .currency-control--inline {
        margin-right: 0;
        width: 100%;
      }
      .rtc-toolbar-note {
        padding: 0 14px 10px;
        font-size: 10px;
      }
      .currency-control-label { font-size: 11px; }
      .sort-label { font-size: 11px; }
      .currency-toggle-btn { padding: 4px 10px; font-size: 11px; }

      .results-table-desktop { display: none; }
      .results-matrix-mobile {
        display: flex;
        flex-direction: column;
        gap: 14px;
        padding: 12px 14px 16px;
      }
      .matrix-hotel-card {
        border: 1.5px solid var(--border);
        border-radius: var(--radius-lg);
        overflow: hidden;
        background: var(--surface);
        box-shadow: var(--shadow-sm);
      }
      .matrix-hotel-header {
        padding: 14px 16px;
        background: var(--surface-2);
        border-bottom: 1px solid var(--border);
      }
      .matrix-hotel-name {
        font-size: 15px;
        font-weight: 600;
        color: var(--text-1);
        line-height: 1.35;
      }
      .matrix-hotel-meta {
        font-size: 12px;
        color: var(--text-3);
        margin-top: 4px;
      }
      .matrix-date-row {
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 14px 16px;
        border-bottom: 1px solid var(--border);
      }
      .matrix-date-row:last-child { border-bottom: none; }
      .matrix-date-row.best { background: var(--gold-bg); }
      .matrix-date-row.highlighted {
        animation: cell-highlight 2.4s ease-out forwards;
      }
