// ─── ALERT HOTEL SEARCH (single select, same API as compare flow) ───────────────
function SingleHotelSearch({ value, onChange, scanHotels = [], allHotels = [] }) {
  const [query, setQuery] = useState('');
  const [results, setResults] = useState([]);
  const [activeIdx, setActiveIdx] = useState(-1);
  const [isFocused, setIsFocused] = useState(false);
  const [searching, setSearching] = useState(false);
  const ref = useRef(null);
  const inputRef = useRef(null);
  const debounceRef = useRef(null);
  const fallbackHotels = allHotels.length ? allHotels : HOTELS_STATIC;

  useEffect(() => {
    if (!query) { setResults([]); setActiveIdx(-1); setSearching(false); return; }
    setActiveIdx(-1);
    clearTimeout(debounceRef.current);
    debounceRef.current = setTimeout(() => {
      setSearching(true);
      const words = query.toLowerCase().split(/\s+/).filter(w => w.length > 2);
      const filterByName = rows => words.length
        ? rows.filter(h => words.some(w => (h.name || '').toLowerCase().includes(w) || (h.city || '').toLowerCase().includes(w)))
        : rows;
      searchHotelsRemote(query, value ? [value] : [])
        .then(r => { setResults(filterByName(r)); setSearching(false); })
        .catch(() => { setResults(filterByName(searchHotelsFallback(query, value ? [value] : [], null, fallbackHotels))); setSearching(false); });
    }, SEARCH_DEBOUNCE_MS);
    return () => clearTimeout(debounceRef.current);
  }, [query, value, fallbackHotels]);

  useEffect(() => {
    const fn = e => { if (ref.current && !ref.current.contains(e.target)) setIsFocused(false); };
    document.addEventListener('mousedown', fn);
    return () => document.removeEventListener('mousedown', fn);
  }, []);

  const select = hotel => {
    onChange(hotel);
    setQuery('');
    setIsFocused(false);
    inputRef.current?.blur();
  };

  const handleKey = e => {
    if (e.key === 'ArrowDown') { e.preventDefault(); setActiveIdx(i => Math.min(i + 1, results.length - 1)); }
    if (e.key === 'ArrowUp') { e.preventDefault(); setActiveIdx(i => Math.max(i - 1, 0)); }
    if (e.key === 'Enter' && activeIdx >= 0) select(results[activeIdx]);
    if (e.key === 'Escape') { setQuery(''); setIsFocused(false); inputRef.current?.blur(); }
  };

  const stars = n => STAR_CHAR.repeat(n);
  const icon = h => h.stars >= 5 ? '🏰' : h.stars >= 4 ? '🏨' : '🏩';
  const showDrop = isFocused && query;

  if (value) {
    return (
      <div className="alert-hotel-selected">
        <span className="alert-hotel-selected-name">{value.name}</span>
        <span className="alert-hotel-selected-meta">{value.city}{value.region ? ` · ${value.region}` : ''}</span>
        <button type="button" className="alert-hotel-change" onClick={() => onChange(null)}>Change hotel</button>
      </div>
    );
  }

  return (
    <div ref={ref}>
      {scanHotels.length > 0 && (
        <div className="alert-scan-picks">
          <span className="alert-label">From your comparison</span>
          <div className="alert-scan-picks-row">
            {scanHotels.map(h => (
              <button key={h.id} type="button" className="alert-scan-pick" onClick={() => select(h)}>
                {h.name}
              </button>
            ))}
          </div>
        </div>
      )}
      <div className="search-box-wrap" style={{ position: 'relative' }}>
        <div className="search-box">
          <span className="search-box-icon">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <circle cx="6.5" cy="6.5" r="5" stroke="#9C9C9C" strokeWidth="1.5"/>
              <path d="M10.5 10.5L14 14" stroke="#9C9C9C" strokeWidth="1.5" strokeLinecap="round"/>
            </svg>
          </span>
          <input
            ref={inputRef}
            value={query}
            onChange={e => setQuery(e.target.value)}
            onKeyDown={handleKey}
            onFocus={() => setIsFocused(true)}
            placeholder="Search hotels or destinations…"
            aria-label="Search hotel for price alert"
          />
        </div>
        {showDrop && (
          <div className="search-dropdown" onMouseDown={e => e.preventDefault()}>
            {searching
              ? <div className="search-no-results">Searching…</div>
              : results.length === 0
              ? <div className="search-no-results">No results for "{query}"</div>
              : results.map((h, i) => (
                <div key={h.id} className={`search-item ${i === activeIdx ? 'active' : ''}`} onClick={() => select(h)}>
                  <div className="search-item-icon">{icon(h)}</div>
                  <div className="search-item-body">
                    <div className="search-item-name">{h.name}</div>
                    <div className="search-item-meta">{h.city} · {h.region}</div>
                  </div>
                  <div className="search-item-stars" style={{ color: '#C9963A' }}>{stars(h.stars)}</div>
                </div>
              ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ─── ALERTS PANEL ─────────────────────────────────────────────────────────────
function buildAlertScanKey(scanHotels = [], scanDates = []) {
  const hotels = scanHotels.map(h => h.id).sort().join(',');
  const dates = scanDates.map(d => `${d.checkIn}|${d.checkOut}`).sort().join(',');
  return `${hotels}::${dates}`;
}

function isAlertForScan(alert, scanHotels, scanDates, scanKey) {
  if (scanKey && alert.scanKey) return alert.scanKey === scanKey;
  const hotelMatch = scanHotels.some(h => h.name === alert.hotel.name && h.city === alert.hotel.city);
  const dateMatch = scanDates.some(d => d.checkIn === alert.checkIn && d.checkOut === alert.checkOut);
  return hotelMatch && dateMatch;
}

function AlertsPanel({ scanHotels = [], scanDates = [], scanResults = {}, scanKey = '', allHotels = [] }) {
  const [alerts, setAlerts] = useState([]);
  const [selectedHotel, setSelectedHotel] = useState(null);
  const [dateRange, setDateRange] = useState({ checkIn: '', checkOut: '' });
  const [targetPrice, setTargetPrice] = useState('');
  const [email, setEmail] = useState(() => {
    try { return localStorage.getItem('hs-alert-email') || ''; } catch { return ''; }
  });
  const [saving, setSaving] = useState(false);
  const [checkingId, setCheckingId] = useState(null);
  const [error, setError] = useState(null);
  const [successMsg, setSuccessMsg] = useState(null);
  const [emailWarn, setEmailWarn] = useState(null);
  const [expanded, setExpanded] = useState(false);

  useEffect(() => {
    fetch('/api/alerts').then(r => r.json()).then(setAlerts).catch(() => {});
  }, []);

  const relevantAlerts = React.useMemo(() => {
    if (!scanHotels.length || !scanDates.length) return [];
    return alerts
      .filter(a => isAlertForScan(a, scanHotels, scanDates, scanKey))
      .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt))
      .slice(0, 2);
  }, [alerts, scanHotels, scanDates, scanKey]);

  useEffect(() => {
    setExpanded(relevantAlerts.length > 0);
  }, [scanKey, relevantAlerts.length]);

  useEffect(() => {
    if (scanHotels.length) setSelectedHotel(scanHotels[0]);
  }, [scanKey, scanHotels]);

  useEffect(() => {
    if (scanDates.length) {
      setDateRange({ checkIn: scanDates[0].checkIn, checkOut: scanDates[0].checkOut });
    }
  }, [scanKey, scanDates]);

  useEffect(() => {
    if (!successMsg) return;
    const t = setTimeout(() => setSuccessMsg(null), 8000);
    return () => clearTimeout(t);
  }, [successMsg]);

  const currentRateHint = (() => {
    if (!selectedHotel || !dateRange.checkIn || !dateRange.checkOut) return null;
    const di = scanDates.findIndex(d => d.checkIn === dateRange.checkIn && d.checkOut === dateRange.checkOut);
    if (di < 0) return null;
    const r = scanResults[selectedHotel.id]?.[di];
    return r?.rate > 0 ? r.rate : null;
  })();

  async function createAlert(e) {
    e.preventDefault();
    setError(null);
    setSuccessMsg(null);
    setEmailWarn(null);
    if (!selectedHotel || !dateRange.checkIn || !dateRange.checkOut || !targetPrice || !email) {
      setError('Select a hotel, dates, target price, and email.'); return;
    }
    setSaving(true);
    try {
      const res = await fetch('/api/alerts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          hotel: selectedHotel,
          checkIn: dateRange.checkIn,
          checkOut: dateRange.checkOut,
          targetPrice: Number(targetPrice),
          email,
          scanKey,
        }),
      });
      if (!res.ok) { const d = await res.json(); setError(d.error); return; }
      const data = await res.json();
      const price = Number(targetPrice);
      setAlerts(prev => [...prev, data]);
      try { localStorage.setItem('hs-alert-email', email); } catch {}
      setTargetPrice('');
      setSuccessMsg(`Watch set for ${selectedHotel.name}. We'll check rates about every 6 hours and email you when the rate drops below $${price}/night.`);
      if (data.confirmationEmailSent) {
        const from = data.confirmationFromEmail || 'the sender';
        setSuccessMsg(prev =>
          `${prev} A confirmation was sent to ${email}. If it is not in your inbox, check Spam or Promotions and add ${from} to your safe senders.`
        );
      } else if (data.smtpConfigured === false) {
        setEmailWarn(
          'Your watch was saved, but email is not configured on this server yet. '
          + 'On Render → hotel-rate-scanner → Environment, add SMTP_USER, SMTP_PASS (Gmail App Password), '
          + 'SMTP_HOST=smtp.gmail.com, SMTP_PORT=587, save, wait for redeploy, then confirm /api/status shows smtpConfigured: true.'
        );
      } else {
        setEmailWarn(
          'Your watch was saved, but the confirmation email could not be sent. '
          + (data.confirmationEmailError
            ? `Error: ${data.confirmationEmailError}`
            : 'Check Render logs for [Alert] Signup email failed, verify the Gmail App Password, and restart the service.')
        );
      }
      setExpanded(true);
    } catch { setError('Failed to save alert.'); }
    finally { setSaving(false); }
  }

  async function deleteAlert(id) {
    await fetch(`/api/alerts/${id}`, { method: 'DELETE' });
    setAlerts(prev => prev.filter(a => a.id !== id));
  }

  async function checkNow(id) {
    setCheckingId(id);
    try {
      const res = await fetch(`/api/alerts/${id}/check`, { method: 'POST' });
      const data = await res.json();
      if (data.alert) setAlerts(prev => prev.map(a => a.id === id ? data.alert : a));
    } finally { setCheckingId(null); }
  }

  async function resetAlert(id) {
    const res = await fetch(`/api/alerts/${id}/reset`, { method: 'POST' });
    const updated = await res.json();
    setAlerts(prev => prev.map(a => a.id === id ? updated : a));
  }

  const fmt = ds => ds ? new Date(ds + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '';
  const bookUrlForAlert = a => a.triggeredBookingUrl || a.lastBookingUrl || null;

  return (
    <div className="alerts-panel">
      <div className="alerts-panel-inner">
        <div className="alerts-header">
          <span className="alerts-title">Watch for a lower rate</span>
          <span className="alerts-subtitle">Not ready to book at these prices? Set a target and we'll email you if rates drop. We check about every 6 hours.</span>
        </div>

        {!expanded && (
          <button type="button" className="alert-submit" style={{ marginBottom: 16 }} onClick={() => setExpanded(true)}>
            Watch for a lower rate
          </button>
        )}

        {expanded && (
          <>
            {successMsg && <div className="alert-success">{successMsg}</div>}
            {emailWarn && <div className="alert-warn">{emailWarn}</div>}

            <form className="alert-form" onSubmit={createAlert}>
              <div className="alert-form-group">
                <label className="alert-label">Hotel</label>
                <SingleHotelSearch
                  value={selectedHotel}
                  onChange={setSelectedHotel}
                  scanHotels={scanHotels}
                  allHotels={allHotels}
                />
              </div>

              {scanDates.length > 0 && (
                <div className="alert-scan-picks">
                  <span className="alert-label">Date options from your comparison</span>
                  <div className="alert-scan-picks-row">
                    {scanDates.map((d, i) => (
                      <button
                        key={i}
                        type="button"
                        className={`alert-scan-pick ${dateRange.checkIn === d.checkIn && dateRange.checkOut === d.checkOut ? 'on' : ''}`}
                        onClick={() => setDateRange({ checkIn: d.checkIn, checkOut: d.checkOut })}
                      >
                        Option {OPTION_LABELS[i]} · {formatDate(d.checkIn)} – {formatDate(d.checkOut)}
                      </button>
                    ))}
                  </div>
                </div>
              )}

              <div className="alert-form-group">
                <label className="alert-label">Stay dates</label>
                <DateRangePicker value={dateRange} onChange={setDateRange} minDate={todayStr()} />
              </div>

              <div className="alert-form-row">
                <div className="alert-form-group alert-form-group--sm">
                  <label className="alert-label">Notify below ($/night)</label>
                  <input className="alert-input" type="number" min="1" placeholder="200" value={targetPrice} onChange={e => setTargetPrice(e.target.value)} />
                </div>
                <div className="alert-form-group alert-form-group--grow">
                  <label className="alert-label">Your email</label>
                  <input className="alert-input" type="email" placeholder="you@example.com" value={email} onChange={e => setEmail(e.target.value)} />
                </div>
                <div className="alert-form-group alert-form-group--btn">
                  <span className="alert-label alert-label--spacer" aria-hidden="true">&nbsp;</span>
                  <button className="alert-submit" type="submit" disabled={saving}>{saving ? 'Saving…' : 'Start watching'}</button>
                </div>
              </div>
              {currentRateHint != null && (
                <p className="alert-rate-hint">Current rate from comparison: ${currentRateHint}/night</p>
              )}
              {error && <p className="alert-error">{error}</p>}
            </form>
          </>
        )}

        {relevantAlerts.length > 0 ? (
          <>
            <p className="alert-label" style={{ marginBottom: 10 }}>Your watches for this search</p>
          <div className="alert-list">
            {relevantAlerts.map(a => (
              <div key={a.id} className={`alert-row ${a.triggered ? 'alert-row--triggered' : ''}`}>
                <div className="alert-row-main">
                  <span className="alert-row-hotel">{a.hotel.name}</span>
                  <span className="alert-row-city">{a.hotel.city}</span>
                  <span className="alert-row-dates">{fmt(a.checkIn)} – {fmt(a.checkOut)}</span>
                  <span className="alert-row-target">Target: <strong>${a.targetPrice}/night</strong></span>
                  {a.lastRate != null && <span className="alert-row-last">Last seen: ${a.lastRate}/night</span>}
                  {a.triggered && <span className="alert-row-badge">Triggered at ${a.triggeredRate}/night</span>}
                </div>
                <div className="alert-row-actions">
                  {a.triggered && bookUrlForAlert(a) && (
                    <a href={bookUrlForAlert(a)} target="_blank" rel="noopener noreferrer" className="alert-action alert-action--book">
                      Book now →
                    </a>
                  )}
                  {!a.triggered && (
                    <button className="alert-action" onClick={() => checkNow(a.id)} disabled={checkingId === a.id}>
                      {checkingId === a.id ? 'Checking…' : 'Check now'}
                    </button>
                  )}
                  {a.triggered && (
                    <button className="alert-action" onClick={() => resetAlert(a.id)}>Re-enable</button>
                  )}
                  <button className="alert-action alert-action--delete" onClick={() => deleteAlert(a.id)}>Delete</button>
                </div>
              </div>
            ))}
          </div>
          </>
        ) : expanded ? (
          <p className="alert-empty">No watches for this search yet.</p>
        ) : null}
      </div>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [recentSearches, saveRecent] = useRecentSearches();
  const [selectedHotels, setSelectedHotels] = useState([]);
  const [allHotels, setAllHotels] = useState([]);
  const [dateRanges, setDateRanges] = useState([
    { checkIn: '', checkOut: '' },
    { checkIn: '', checkOut: '' },
  ]);
  const [results, setResults] = useState({});
  const [loadingCells, setLoadingCells] = useState(new Set());
  const [isComparing, setIsComparing] = useState(false);
  const [showResults, setShowResults] = useState(false);
  const [sortBy, setSortBy] = useState('adr');
  const [usageNotice, setUsageNotice] = useState(null);
  const [displayCurrencyMode, setDisplayCurrencyMode] = useState('USD');
  const [modal, setModal] = useState(null); // null | 'casestudy' | 'important'
  const [highlightKey, setHighlightKey] = useState(null);
  const [stepLayout, setStepLayout] = useState(() => {
    try { return localStorage.getItem('hs-step-layout') || 'columns'; } catch { return 'columns'; }
  });
  const [isMobileLayout, setIsMobileLayout] = useState(() =>
    typeof window !== 'undefined' && window.matchMedia('(max-width: 768px)').matches
  );
  const resultsRef = useRef(null);
  const tableRef = useRef(null);

  useEffect(() => {
    try { localStorage.setItem('hs-step-layout', stepLayout); } catch {}
  }, [stepLayout]);

  useEffect(() => {
    const mq = window.matchMedia('(max-width: 768px)');
    const onChange = () => setIsMobileLayout(mq.matches);
    onChange();
    mq.addEventListener('change', onChange);
    return () => mq.removeEventListener('change', onChange);
  }, []);

  const effectiveStepLayout = isMobileLayout ? 'rows' : stepLayout;

  // Load full hotel list from server on mount
  useEffect(() => {
    fetch('/api/hotels')
      .then(r => r.json())
      .then(hotels => setAllHotels(hotels.length ? hotels : HOTELS_STATIC))
      .catch(() => setAllHotels(HOTELS_STATIC));
  }, []);

  const handleCardClick = (key) => {
    setHighlightKey(key);
    tableRef.current?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    setTimeout(() => setHighlightKey(null), 2200);
  };

  const validDates = dateRanges.filter(d => d.checkIn && d.checkOut && d.checkOut > d.checkIn);
  const canCompare = selectedHotels.length >= MIN_HOTELS && validDates.length >= MIN_DATE_RANGES && !isComparing;

  const hotelsMet = selectedHotels.length >= MIN_HOTELS;
  const datesMet  = validDates.length >= MIN_DATE_RANGES;

  const localCurrencyCode = resolveLocalCurrencyForHotels(selectedHotels);

  const alertScanKey = React.useMemo(
    () => buildAlertScanKey(selectedHotels, validDates),
    [selectedHotels, validDates]
  );

  const displayedResults = React.useMemo(() => {
    const next = {};
    const hotelById = Object.fromEntries(selectedHotels.map(h => [h.id, h]));
    for (const [hotelId, byDate] of Object.entries(results)) {
      next[hotelId] = {};
      for (const [di, r] of Object.entries(byDate || {})) {
        next[hotelId][di] = r ? applyDisplayModeToResult(r, displayCurrencyMode, hotelById[hotelId]) : r;
      }
    }
    return next;
  }, [results, displayCurrencyMode, selectedHotels]);

  // Flatten results for summary
  const flatResults = selectedHotels.flatMap(hotel =>
    validDates.map((d, di) => {
      const r = displayedResults[hotel.id]?.[di];
      if (!r?.available) return null;
      return { ...r, hotelId: hotel.id, dateIdx: di, nights: nightsBetween(d.checkIn, d.checkOut), total: r.rate * nightsBetween(d.checkIn, d.checkOut) };
    }).filter(Boolean)
  );

  // Best cell key
  const bestKey = (() => {
    if (!flatResults.length) return null;
    const best = flatResults.reduce((a, b) => b.rate < a.rate ? b : a);
    return `${best.hotelId}|${best.dateIdx}`;
  })();

  const compareRates = () => {
    if (!canCompare) return;
    setIsComparing(true);
    setShowResults(false);
    setResults({});
    setUsageNotice(null);

    // Build loading set
    const cells = new Set();
    selectedHotels.forEach(h => validDates.forEach((_, di) => cells.add(`${h.id}|${di}`)));
    setLoadingCells(cells);

    // Staggered async fetch — live rates via server, simulation fallback
    const promises = [];
    selectedHotels.forEach((hotel, hi) => {
      validDates.forEach((dr, di) => {
        const delay = hi * 280 + di * 90 + 100;
        const p = new Promise(resolve => setTimeout(resolve, delay))
          .then(() => fetchRate(hotel, dr.checkIn, dr.checkOut))
          .then(rateData => {
            if (rateData.quotaLimited && rateData.message) setUsageNotice(rateData.message);
            setResults(prev => ({
              ...prev,
              [hotel.id]: { ...(prev[hotel.id] || {}), [di]: rateData }
            }));
            setLoadingCells(prev => {
              const next = new Set(prev);
              next.delete(`${hotel.id}|${di}`);
              return next;
            });
          });
        promises.push(p);
      });
    });

    Promise.all(promises).then(() => {
      setIsComparing(false);
      setShowResults(true);
      setTimeout(() => resultsRef.current?.scrollIntoView({ behavior: 'smooth', block: 'start' }), 80);
    });
  };

  const addHotel = hotel => {
    if (selectedHotels.length >= MAX_HOTELS) return;
    if (selectedHotels.find(h => h.id === hotel.id)) return;
    setSelectedHotels(prev => [...prev, hotel]);
    saveRecent(hotel);
    setShowResults(false);
  };
  const removeHotel = id => {
    setSelectedHotels(prev => prev.filter(h => h.id !== id));
    setShowResults(false);
  };

  return (
    <div className="page">
      {/* NAV */}
      <div className="hero-section-wrap">
      <nav className="nav">
        <div className="nav-inner">
          <div className="nav-logo">Hotel Rate Scanner <em>&amp; Price Alerts</em><a className="nav-logo-sub" href="https://sevenfeettravel.com" target="_blank" rel="noopener noreferrer">by Seven Feet Travel</a></div>
          <div className="nav-right">
            <button className="nav-link" onClick={() => setModal('casestudy')}>About</button>
            <div className="nav-badge">Portfolio Prototype</div>
          </div>
        </div>
      </nav>

      {/* HERO */}
      <div className="hero">
        <h1 className="hero-headline">
          <span className="hero-nowrap">Compare rates across dates,</span><br />
          <em>not across tabs.</em>
        </h1>
        <p className="hero-value">
          Search by hotel, destination, or dates to compare live rates across hotel and OTA platforms.
        </p>
        <p className="hero-value">
          Once your results load, you can review available prices, check alternate dates, and set a price alert if the rate is not aligned with your budget yet.
        </p>
        <p className="hero-note">Search any hotel worldwide — live rates with demo fallback when daily limits apply.</p>
      </div>
      </div>

      {/* MAIN CARD */}
      <div className="container">
        <div className="main-card">

          <div className="step-layout-bar">
            <div className="step-layout-group">
              <span className="step-layout-label">View</span>
              <div className="step-layout-toggle" role="group" aria-label="View: stacked or side by side">
              <button
                type="button"
                className={`step-layout-btn ${stepLayout === 'rows' ? 'on' : ''}`}
                onClick={() => setStepLayout('rows')}
              >Stacked</button>
              <button
                type="button"
                className={`step-layout-btn ${stepLayout === 'columns' ? 'on' : ''}`}
                onClick={() => setStepLayout('columns')}
              >Side by side</button>
              </div>
            </div>
          </div>

          <div className={`main-card-steps layout-${effectiveStepLayout}`}>
          {/* STEP 1 — Hotels */}
          <div className="main-card-section main-card-section--hotels">
            <div className="section-label">
              <span className="section-num">1</span>
              <span className="section-title">Search and add hotels</span>
              <span className="section-subtitle">Up to {MAX_HOTELS}</span>
            </div>
            <HotelSearch
              selectedHotels={selectedHotels}
              onAdd={addHotel}
              onRemove={removeHotel}
              allHotels={allHotels}
              recentSearches={recentSearches}
            />
          </div>

          {/* STEP 2 — Dates */}
          <div className="main-card-section main-card-section--dates">
            <div className="section-label">
              <span className="section-num">2</span>
              <span className="section-title">Add date options</span>
              <span className="section-subtitle">{MIN_DATE_RANGES} – {MAX_DATE_RANGES} ranges</span>
            </div>
            <DateRanges ranges={dateRanges} onChange={setDateRanges} />
          </div>
          </div>

          {/* STEP 3 — CTA */}
          <div className="cta-wrap">
            <div className="cta-inner">
              <button className="compare-btn" onClick={compareRates} disabled={!canCompare}>
                {isComparing ? (
                  <><div className="spinner" /> Scanning rates…</>
                ) : (
                  <>Compare Rates</>
                )}
              </button>
              <div className="cta-checklist">
                <div className="cta-req">
                  <span className={`cta-dot ${hotelsMet ? 'met' : ''}`} />
                  {hotelsMet ? `${selectedHotels.length} hotel${selectedHotels.length !== 1 ? 's' : ''} selected` : `Select at least ${MIN_HOTELS} hotel`}
                </div>
                <div className="cta-req">
                  <span className={`cta-dot ${datesMet ? 'met' : ''}`} />
                  {datesMet ? `${validDates.length} date range${validDates.length !== 1 ? 's' : ''} ready` : `Add at least ${MIN_DATE_RANGES} complete date ranges`}
                </div>
              </div>
            </div>
          </div>

        </div>

        {/* RESULTS */}
        {(showResults || loadingCells.size > 0) && (
          <div className="results-section" ref={resultsRef}>
            {usageNotice && (
              <div className="usage-notice">
                <strong>Prototype note:</strong> {usageNotice}
              </div>
            )}
            <SummaryCards
              flatResults={flatResults}
              hotels={selectedHotels}
              validDates={validDates}
              onCardClick={handleCardClick}
            />
            <div ref={tableRef}>
              <ResultsTable
                results={displayedResults}
                loadingCells={loadingCells}
                hotels={selectedHotels}
                validDates={validDates}
                sortBy={sortBy}
                onSort={setSortBy}
                bestKey={bestKey}
                highlightKey={highlightKey}
                displayCurrencyMode={displayCurrencyMode}
                onDisplayCurrencyChange={setDisplayCurrencyMode}
                localCurrencyCode={localCurrencyCode}
              />
            </div>
            <div style={{ display: "flex", justifyContent: "center", marginTop: 16 }}>
              <button className="footer-note-btn" type="button" onClick={() => setModal('important')}>
                Important to understand
              </button>
            </div>
            {showResults && loadingCells.size === 0 && (
              <AlertsPanel
                scanHotels={selectedHotels}
                scanDates={validDates}
                scanResults={results}
                scanKey={alertScanKey}
                allHotels={allHotels}
              />
            )}
          </div>
        )}

      </div>

      {/* FOOTER */}
      <footer className="footer">
        <div className="footer-author">
          Built by <a className="footer-a" href="https://linkedin.com/in/paultotah" target="_blank" rel="noopener noreferrer">Paul Totah</a> · © 2026 <a className="footer-a" href="https://sevenfeettravel.com" target="_blank" rel="noopener noreferrer">Seven Feet Travel</a> · All rights reserved
        </div>
      </footer>

      {/* MODAL — About */}
      {modal === 'casestudy' && (
        <Modal title="About" onClose={() => setModal(null)}>

          <div className="modal-section-label">What to know</div>
          <div className="modal-grid">
            <div className="modal-card">
              <div className="modal-card-tag">Booking links</div>
              <div className="modal-card-text">"Book →" links directly to brand.com (Marriott, Hilton, Hyatt, IHG) with your dates pre-filled when the brand path is available. For independent hotels, the tool uses a direct Booking.com property link when SerpAPI provides one; otherwise it falls back to a Booking.com search with your hotel and dates filled in. Always confirm the final booking details before reserving.</div>
            </div>
            <div className="modal-card">
              <div className="modal-card-tag">Live discovery</div>
              <div className="modal-card-text">Search any hotel worldwide — rates and results are from live hotel search data, with demo fallback when daily limits apply.</div>
            </div>
          </div>

          <div className="modal-section-label" style={{ marginTop: '28px' }}>Why I built this</div>
          <div className="modal-grid">
            <div className="modal-card">
              <div className="modal-card-tag">The Problem</div>
              <div className="modal-card-text">When you already know which hotel you want, comparing rates across multiple possible travel dates is painful. You open tabs, write down prices, and repeat. The data exists — it's just never in one place.</div>
            </div>
            <div className="modal-card">
              <div className="modal-card-tag">The Approach</div>
              <div className="modal-card-text">A multi-axis rate matrix: pin the hotels you're considering, add the date ranges that could work, and see the complete grid at once. Once results load, set a price alert if the current rate is not aligned with your budget. One view replaces a dozen searches.</div>
            </div>
            <div className="modal-card">
              <div className="modal-card-tag">What This Demonstrates</div>
              <div className="modal-card-text">This demonstrates product thinking: a clearly defined problem, deliberate MVP scoping, and progressive disclosure of complexity. It also reflects technical execution: React architecture, progressive async state, and deep-link booking integration across Marriott, Hyatt, IHG, and Hilton — with a clear path to a live rates API.</div>
            </div>
          </div>

        </Modal>
      )}

{/* MODAL — Important to understand */}
      {modal === 'important' && (
        <Modal title="Important to understand" onClose={() => setModal(null)}>
          <p>
            Each cell shows a nightly rate from live search data, preferring the official brand price when available. Rates exclude taxes and resort/hotel fees unless your booking site bundles them differently. Brand.com totals may not match exactly — aggregators and the hotel site can price different room types or packages.
          </p>
          <p>
            For independent hotels, "Book →" uses a direct Booking.com property link when SerpAPI provides one. If that exact property link is not available, it falls back to a Booking.com search using the selected hotel and dates, so you may need to choose the property again before booking.
          </p>
          <p>
            Use the matrix as a fast comparison tool to spot better date combinations, then confirm the final room type, rate rules, taxes, fees, and availability on the hotel or booking site before making a reservation.
          </p>
        </Modal>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
