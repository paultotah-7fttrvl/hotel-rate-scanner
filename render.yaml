services:
  - type: web
    name: hotel-rate-scanner
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: SERPAPI_KEY
        sync: false
      - key: RATE_MODE
        value: live
      - key: LIVE_DAILY_LIMIT
        value: 33
