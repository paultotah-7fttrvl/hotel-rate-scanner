<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── HOTELS DATA ──────────────────────────────────────────────────────────────
// Live SerpAPI results are the primary data source. HOTELS_STATIC is a last-resort
// offline fallback loaded from sandbox/hotels.js outside the Babel transform.
function stableHotelId(hotel) {
  return `${hotel.city}-${hotel.name}`
    .toLowerCase()
    .replace(/&/g, 'and')
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/^-+|-+$/g, '');
}

const HOTELS_STATIC = (window.HOTELS_RAW || []).map(h => ({
  ...h,
  id: h.id || stableHotelId(h),
  variance: h.variance || 0.25,
}));

function buildHotelsByCity(hotels) {
  return hotels.reduce((acc, hotel) => {
    if (!acc[hotel.city]) acc[hotel.city] = [];
    acc[hotel.city].push(hotel);
    return acc;
  }, {});
}

const HOTELS_BY_CITY = buildHotelsByCity(HOTELS_STATIC);

// ─── SANDBOX: POPULAR DESTINATIONS ───────────────────────────────────────────
// Replaces the dynamic city list derived from hotels.json (which is empty here).
// Each entry triggers a SerpAPI "hotels in [city]" search when clicked.
const POPULAR_DESTINATIONS = [
  'Paris', 'London', 'Tokyo', 'New York', 'Barcelona', 'Sydney',
  'Rome', 'Amsterdam', 'Dubai', 'Singapore', 'Bangkok', 'Lisbon',
  'Vienna', 'Bali', 'Cancun', 'Miami', 'Los Angeles', 'San Francisco',
  'Cape Town', 'Istanbul', 'Marrakech', 'Kyoto', 'Prague', 'Santorini',
];

// ─── CONSTANTS ────────────────────────────────────────────────────────────────
const OPTION_LABELS = ['A','B','C','D','E','F','G','H','I','J'];
const STAR_CHAR = '★';
const MIN_HOTELS = 1;
const MAX_HOTELS = 3;
const MIN_DATE_RANGES = 2;
const MAX_DATE_RANGES = 5;
const SEARCH_DEBOUNCE_MS = 500;

// ─── UTILITIES ────────────────────────────────────────────────────────────────
function nightsBetween(d1, d2) {
  return Math.max(1, Math.round((new Date(d2) - new Date(d1)) / 86400000));
}
function formatCurrency(n, currency = 'USD') {
  return new Intl.NumberFormat('en-US', {
    style: 'currency',
    currency: currency || 'USD',
    minimumFractionDigits: 0,
    maximumFractionDigits: 0,
  }).format(Math.round(n));
}
function formatDate(ds) {
  if (!ds) return '';
  const [y, m, d] = ds.split('-');
  const dt = new Date(+y, +m - 1, +d);
  return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}
function formatDateFull(ds) {
  if (!ds) return '';
  const [y, m, d] = ds.split('-');
  const dt = new Date(+y, +m - 1, +d);
  return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}
function todayStr() {
  return new Date().toISOString().split('T')[0];
}

// ─── HOTEL SEARCH (server-side) ───────────────────────────────────────────────
async function searchHotelsRemote(query, excluded, city) {
  const excludeParam = (excluded || []).map(h => h.id).join(',');
  const params = new URLSearchParams({ exclude: excludeParam });
  if (query) params.set('q', query);
  if (city) params.set('city', city);
  const res = await fetch(`/api/hotels/search?${params}`);
  if (!res.ok) throw new Error('Search failed');
  return res.json();
}

function searchHotelsFallback(query, excluded, city, hotels = HOTELS_STATIC) {
  const excludeSet = new Set((excluded || []).map(h => h.id));
  if (city) {
    const byCity = hotels === HOTELS_STATIC ? HOTELS_BY_CITY : buildHotelsByCity(hotels);
    return (byCity[city] || []).filter(h => !excludeSet.has(h.id)).slice(0, 8);
  }

  const term = (query || '').trim().toLowerCase();
  if (!term) return [];

  return hotels
    .filter(h => !excludeSet.has(h.id))
    .filter(h => [h.name, h.city, h.region].some(v => (v || '').toLowerCase().includes(term)))
    .slice(0, 8);
}

// ─── RATE FETCHER (sandbox) ───────────────────────────────────────────────────
// Always calls the sandbox server — no static hotel list, no fake rates.
async function fetchRate(hotel, checkIn, checkOut, bust = false) {
  try {
    const params = new URLSearchParams({
      hotel: hotel.name,
      city: hotel.city,
      checkin: checkIn,
      checkout: checkOut,
    });
    if (hotel.property_token) params.set('propertyToken', hotel.property_token);
    if (bust) params.set('bust', '1');
    const res = await fetch(`/api/rates?${params}`);
    const data = await res.json();
    const isDemo = data.source === 'demo_fallback' || data.source === 'demo_daily_limit';
    return {
      rate: data.rate,
      available: (data.rate != null && data.rate > 0 && !data.error) || (!!data.booking_url && data.agua_caliente),
      total: data.total,
      source: data.source,
      error: data.error || null,
      quotaLimited: data.quotaLimited || false,
      message: data.message || null,
      nights: data.nights,
      currency: data.currency,
      bookingUrl: data.booking_url || null,
      matchedProperty: data.property_name || data.matched_property || null,
      rateConfidence: data.rate_confidence || null,
      rateDisclaimer: data.rate_disclaimer || 'Rates may or may not include resort or hotel fees. Taxes are not included.',
      rateSourceLabel: (data.rate_source_label && !/google/i.test(data.rate_source_label))
        ? data.rate_source_label : null,
      isDemo,
      ihgBrand: data.ihg_brand || null,
      ihgRegion: data.ihg_region || null,
      ihgLocale: data.ihg_locale || null,
      ihgPropCode: data.ihg_prop_code || null,
    };
  } catch (e) {
    return { rate: null, available: false };
  }
}

// ─── RATE SIMULATION ──────────────────────────────────────────────────────────
// SerpAPI integration: replace this with a call to GET /api/rates?hotel_key=...
function generateRate(hotel, checkIn) {
  const d = new Date(checkIn);
  const dow = d.getDay();
  const month = d.getMonth();
  const charSum = hotel.id.split('').reduce((a, c) => a + c.charCodeAt(0), 0);
  const seed = (charSum * 31 + d.getDate() * 17 + month * 53 + dow * 7) % 100;
  let multiplier = 1;
  if (dow === 5 || dow === 6) multiplier += 0.15;
  if (dow === 0) multiplier += 0.08;
  if (month >= 5 && month <= 8) multiplier += 0.20;
  if (month === 11) multiplier += 0.18;
  const noise = (seed / 100 - 0.5) * (hotel.variance || 0.3);
  const rate = Math.round(hotel.baseRate * (multiplier + noise));
  return {
    rate: Math.max(Math.round(hotel.baseRate * 0.6), rate),
    available: seed > 6,
  };
}

// ─── BOOKING URL BUILDER (sandbox) ───────────────────────────────────────────
// Sandbox hotels have no chain/chainPropertyCode — those come from hotels.json
// which we don't use here. Instead we detect the chain from hotel.url (the
// hotel's own website URL that SerpAPI returns) and extract the property code
// from the URL slug, producing the same brand-direct deep links as demo/prod.
function fmtMMDDYYYY(ds) { const [y,m,d] = ds.split('-'); return `${m}/${d}/${y}`; }

function extractUrlCode(url) {
  // Strip query string and trailing slash, then take the last path segment
  const clean = url.split('?')[0].replace(/\/$/, '');
  return clean.split('/').filter(Boolean).pop() || '';
}

function extractCodeFromUrl(url, domains) {
  try {
    const parsed = new URL(url);
    if (!domains.some(domain => parsed.hostname.includes(domain))) return null;

    const ignoredSegments = new Set([
      'en', 'en-us', 'hotel', 'hotels', 'travel', 'overview', 'rooms',
      'reservation', 'availabilitysearch.mi',
    ]);
    const segments = parsed.pathname
      .split('/')
      .map(s => s.trim())
      .filter(Boolean);

    for (const segment of [...segments].reverse()) {
      if (ignoredSegments.has(segment.toLowerCase())) continue;
      const match = segment.match(/^([a-z0-9]{4,8})(?:-|$)/i);
      if (match) return match[1];
    }
  } catch {
    return null;
  }

  return null;
}

function getChainPropertyCode(hotel, domains) {
  return hotel?.chainPropertyCode || extractCodeFromUrl(hotel?.url || '', domains);
}

function isSupportedBrandUrl(url) {
  return [
    'hyatt.com', 'marriott.com', 'ritzcarlton.com',
    'hilton.com', 'waldorfastoria.com', 'conradhotels.com',
    'ihg.com', 'intercontinental.com', 'kimpton.com', 'kimptonhotels.com',
    'properhotel.com',
  ].some(domain => (url || '').includes(domain));
}

// Open Proper Hotels on properhotel.com (AZDS). Sister portfolio uses other domains.
const PROPER_PROPERTIES = {
  shelborne: { slug: 'proper-shelborne', path: 'shelborne' },
  'santa monica': { slug: 'proper-santa-monica', path: 'santa-monica' },
  'san francisco': { slug: 'proper-sf', path: 'san-francisco' },
  'downtown la': { slug: 'proper-downtown-la', path: 'downtown-la' },
  'downtown l.a': { slug: 'proper-downtown-la', path: 'downtown-la' },
  dtla: { slug: 'proper-downtown-la', path: 'downtown-la' },
  'los angeles': { slug: 'proper-downtown-la', path: 'downtown-la' },
  austin: { slug: 'proper-austin', path: 'austin' },
};

function isProperHotel(hotel) {
  const name = (hotel?.name || '').toLowerCase();
  const url = (hotel?.url || '').toLowerCase();
  return name.includes('proper') || name.includes('shelborne') || url.includes('properhotel.com');
}

function isProperUrl(url) {
  return (url || '').includes('properhotel.com');
}

function resolveProperProperty(hotel, serpUrl) {
  const blob = `${hotel?.name || ''} ${hotel?.city || ''} ${hotel?.url || ''} ${serpUrl || ''}`.toLowerCase();
  for (const [key, prop] of Object.entries(PROPER_PROPERTIES)) {
    if (blob.includes(key)) return prop;
  }
  const fromSerp = (serpUrl || '').match(/!'([^']+)'/);
  if (fromSerp) {
    const slug = fromSerp[1];
    const path = slug.replace(/^proper-/, '');
    return { slug, path };
  }
  const fromUrl = (hotel?.url || serpUrl || '').match(/properhotel\.com\/([^/#?]+)/i);
  if (fromUrl) {
    const path = fromUrl[1].toLowerCase();
    return { slug: `proper-${path}`, path };
  }
  return null;
}

function buildProperBookingUrl(hotel, checkIn, checkOut, serpUrl) {
  const prop = resolveProperProperty(hotel, serpUrl);
  if (!prop) {
    if (serpUrl && isProperUrl(serpUrl)) return serpUrl;
    return null;
  }
  if (typeof ProperAzds !== 'undefined') {
    return ProperAzds.buildBookingUrl(prop.path, prop.slug, checkIn, checkOut, serpUrl);
  }
  return `https://www.properhotel.com/${prop.path}/#/booking/step-1`;
}

function isKimptonHotel(hotel) {
  return (
    (hotel?.name || '').toLowerCase().includes('kimpton') ||
    (hotel?.url || '').includes('cm_mmc=WEB-_-KI-_-')
  );
}

function isAguaCalienteHotel(hotel) {
  const blob = `${hotel?.name || ''} ${hotel?.city || ''} ${hotel?.url || ''}`.toLowerCase();
  return hotel?.chain === 'aguacaliente' || /agua\s*caliente/.test(blob) || blob.includes('aguacalientecasinos.com');
}

function aguaCalienteNights(checkIn, checkOut) {
  const a = new Date(checkIn);
  const b = new Date(checkOut);
  return Math.max(1, Math.round((b - a) / 86400000));
}

function buildAguaCalienteBookingUrl(hotel, checkIn, checkOut, serpUrl) {
  const u = (serpUrl || '').toLowerCase();
  if (u.includes('secure-hotel-tracker.com')) {
    try {
      const parsed = new URL(serpUrl);
      parsed.searchParams.set('checkin', checkIn);
      parsed.searchParams.set('checkout', checkOut);
      return parsed.toString();
    } catch { /* fall through to PEGS */ }
  }
  const los = aguaCalienteNights(checkIn, checkOut);
  const params = new URLSearchParams({
    locale: 'en',
    offerCode: '',
    flow: 'tf',
    Rooms: '1',
    CheckinDate: checkIn,
    LOS: String(los),
    Adults_1: '2',
    Children_1: '0',
    iataNumber: '',
    Currency: 'USD',
    multi: 'false',
    accessCode: '',
  });
  return `https://aguacalientecasinos.book.pegsbe.com/rooms?${params.toString()}`;
}

// IHG's frontend parses qCiMy/qCoMy month values as 0-indexed (Jan=0, Feb=1, …).
// So we must subtract 1 from the calendar month before embedding it in the URL.
function ihgMonthYear(dateStr) {
  const [y, m] = dateStr.split('-');
  return String(+m - 1).padStart(2, '0') + y;
}

const IHG_BRAND_DOMAINS = {
  'intercontinental.com': 'intercontinental',
  'crowneplaza.com':      'crowneplaza',
  'holidayinn.com':       'holidayinn',
  'holidayinnexpress.com':'holidayinnexpress',
  'kimptonhotels.com':    'kimptonhotels',
  'staybridge.com':       'staybridge',
  'candlewood.com':       'candlewood',
};

// Parse any IHG-family URL (ihg.com or brand-owned domain) into { brand, region, locale, propCode }.
function parseIhgUrl(url) {
  if (!url) return null;
  // ihg.com/{brand}/hotels/{region}/{locale}/{city}/{propCode}/
  const m1 = url.match(/ihg\.com\/([\w-]+)\/hotels\/(\w+)\/(\w+)\/[\w-]+\/([a-z0-9]{3,8})(?:\/|$)/i);
  if (m1) return { brand: m1[1], region: m1[2], locale: m1[3], propCode: m1[4].toUpperCase() };
  // qSlH on any IHG domain
  const m2 = url.match(/ihg\.com\/([\w-]+).*[?&]qSlH=([a-z0-9]{3,8})/i);
  if (m2) return { brand: m2[1], region: 'us', locale: 'en', propCode: m2[2].toUpperCase() };
  // Brand-specific domains (intercontinental.com, crowneplaza.com, etc.)
  for (const [domain, brand] of Object.entries(IHG_BRAND_DOMAINS)) {
    if (!url.includes(domain)) continue;
    const qslh = url.match(/[?&]qSlH=([a-z0-9]{3,8})/i);
    if (qslh) return { brand, region: 'us', locale: 'en', propCode: qslh[1].toUpperCase() };
    const hc = url.match(/[?&]hotelCode=([a-z0-9]{3,8})/i);
    if (hc) return { brand, region: 'us', locale: 'en', propCode: hc[1].toUpperCase() };
    const pathM = url.split('?')[0].match(/\/([a-z0-9]{3,8})(?:\/[^/]*)?$/i);
    if (pathM && !/^(en|us|gb|hotels?|detail|overview|rooms?)$/i.test(pathM[1])) {
      return { brand, region: 'us', locale: 'en', propCode: pathM[1].toUpperCase() };
    }
  }
  return null;
}

function isIhgUrl(url) {
  if (!url) return false;
  return url.includes('ihg.com') || Object.keys(IHG_BRAND_DOMAINS).some(d => url.includes(d));
}

// Correct IHG booking URL — select-roomrate with date params (confirmed working format).
function buildIhgSelectRoomrateUrl(brand, region, locale, propCode, address, checkIn, checkOut) {
  const ciD = +checkIn.split('-')[2];
  const coD = +checkOut.split('-')[2];
  return (
    `https://www.ihg.com/${brand}/hotels/${region}/${locale}/find-hotels/select-roomrate` +
    `?qDest=${encodeURIComponent(address || '')}` +
    `&qCiD=${ciD}&qCiMy=${ihgMonthYear(checkIn)}` +
    `&qCoD=${coD}&qCoMy=${ihgMonthYear(checkOut)}` +
    `&qAdlt=2&qChld=0&qRms=1&qSlH=${propCode}&qRmFltr=`
  );
}

function buildBookingUrl(hotel, checkIn, checkOut) {
  if (!hotel || !checkIn || !checkOut) return '#';
  if (hotel.bookingUrl) return hotel.bookingUrl;

  const siteUrl = hotel.url || '';

  // ── Hyatt ────────────────────────────────────────────────────────────────────
  // SerpAPI link: https://www.hyatt.com/en-US/hotel/australia/park-hyatt-sydney/sydph
  // Property code is the last path segment (e.g. "sydph")
  if (siteUrl.includes('hyatt.com')) {
    const code = getChainPropertyCode(hotel, ['hyatt.com']);
    if (code) return `https://www.hyatt.com/shop/rooms/${code.toLowerCase()}?location=${encodeURIComponent(hotel.name)}&checkinDate=${checkIn}&checkoutDate=${checkOut}&rooms=1&adults=2&kids=0&rate=Standard&accessibilityCheck=false`;
  }

  // ── Marriott / Ritz-Carlton ───────────────────────────────────────────────────
  if (siteUrl.includes('marriott.com') || siteUrl.includes('ritzcarlton.com')) {
    const code = getChainPropertyCode(hotel, ['marriott.com', 'ritzcarlton.com'])?.toUpperCase();
    if (code) return `https://www.marriott.com/reservation/availabilitySearch.mi?propertyCode=${code}&fromDate=${encodeURIComponent(fmtMMDDYYYY(checkIn))}&toDate=${encodeURIComponent(fmtMMDDYYYY(checkOut))}&numberOfRooms=1&numAdultsPerGuestRoom=2`;
  }

  // ── Hilton ───────────────────────────────────────────────────────────────────
  // SerpAPI link: https://www.hilton.com/en/hotels/AMSWAWA-waldorf-astoria-amsterdam/
  // CTYHOCN code is the first part of the last slug (all caps)
  if (siteUrl.includes('hilton.com')) {
    const code = getChainPropertyCode(hotel, ['hilton.com'])?.toUpperCase();
    if (code) return `https://www.hilton.com/en/book/reservation/rooms/?ctyhocn=${code}&arrivalDate=${checkIn}&departureDate=${checkOut}&room1NumAdults=2`;
  }

  // ── IHG ──────────────────────────────────────────────────────────────────────
  if (isIhgUrl(siteUrl)) {
    const ihg = parseIhgUrl(siteUrl);
    if (ihg) return buildIhgSelectRoomrateUrl(ihg.brand, ihg.region, ihg.locale, ihg.propCode, hotel.address || '', checkIn, checkOut);
  }

  // ── Booking.com fallback (dates pre-filled) ───────────────────────────────────
  const q = encodeURIComponent(`${hotel.name} ${hotel.city}`);
  return `https://www.booking.com/search.html?ss=${q}&checkin=${checkIn}&checkout=${checkOut}&no_rooms=1&group_adults=2&lang=en-us`;
}

function resolveBookingUrl(hotel, rateResult, checkIn, checkOut) {
  if (!rateResult?.available) return '#';
  const serpUrl = rateResult.bookingUrl;

  if (isAguaCalienteHotel(hotel) || (serpUrl && /aguacaliente|secure-hotel-tracker/i.test(serpUrl))) {
    const acUrl = buildAguaCalienteBookingUrl(hotel, checkIn, checkOut, serpUrl);
    if (acUrl) return acUrl;
  }

  // IHG — try all three sources in priority order, then build select-roomrate URL with user dates.
  // 1. Server extracted brand+propCode from prices[] (most reliable)
  if (rateResult.ihgPropCode && rateResult.ihgBrand) {
    const region = rateResult.ihgRegion || 'us';
    const locale = rateResult.ihgLocale || 'en';
    return buildIhgSelectRoomrateUrl(rateResult.ihgBrand, region, locale, rateResult.ihgPropCode, hotel.address || '', checkIn, checkOut);
  }
  // 2. serpUrl is an IHG brand URL — parse it for brand/propCode
  if (isIhgUrl(serpUrl)) {
    const ihg = parseIhgUrl(serpUrl);
    if (ihg) return buildIhgSelectRoomrateUrl(ihg.brand, ihg.region, ihg.locale, ihg.propCode, hotel.address || '', checkIn, checkOut);
  }
  // 3. hotel.url is an IHG brand URL (hoteldetail page from SerpAPI)
  if (isIhgUrl(hotel?.url)) {
    const ihg = parseIhgUrl(hotel.url);
    if (ihg) return buildIhgSelectRoomrateUrl(ihg.brand, ihg.region, ihg.locale, ihg.propCode, hotel.address || '', checkIn, checkOut);
  }

  // Proper Hotels — always build AZDS URL from scanner dates (never reuse OTA or bare hotel links).
  if (isProperHotel(hotel) || isProperUrl(serpUrl) || isProperUrl(hotel?.url)) {
    const properUrl = buildProperBookingUrl(hotel, checkIn, checkOut, serpUrl);
    if (properUrl) return properUrl;
  }

  // Marriott: extract propertyCode from decoded serpUrl and rebuild with user dates.
  if (serpUrl && (serpUrl.includes('marriott.com') || serpUrl.includes('ritzcarlton.com'))) {
    const m = serpUrl.match(/[?&]propertyCode=([A-Z0-9]+)/i);
    if (m) return `https://www.marriott.com/reservation/availabilitySearch.mi?propertyCode=${m[1].toUpperCase()}&fromDate=${encodeURIComponent(fmtMMDDYYYY(checkIn))}&toDate=${encodeURIComponent(fmtMMDDYYYY(checkOut))}&numberOfRooms=1&numAdultsPerGuestRoom=2`;
    return serpUrl;
  }

  // Other supported brand-direct links (Hilton, Hyatt, etc.) from SerpAPI.
  if (serpUrl && isSupportedBrandUrl(serpUrl)) return serpUrl;

  // Construct booking URL from hotel.url property code (Hyatt, Marriott, Hilton).
  if (isSupportedBrandUrl(hotel?.url)) return buildBookingUrl(hotel, checkIn, checkOut);

  // OTA link (dates pre-filled from SerpAPI) or booking.com search fallback.
  if (isProperHotel(hotel)) {
    const properUrl = buildProperBookingUrl(hotel, checkIn, checkOut, null);
    if (properUrl) return properUrl;
  }
  return serpUrl || buildBookingUrl(hotel, checkIn, checkOut);
}

// ─── KIMPTON ASYNC BOOK BUTTON ────────────────────────────────────────────────
// For Kimpton properties whose IHG property code wasn't in the rate response,
// we scrape the hotel's own website server-side to get the code on click.
function KimptonBookButton({ hotel, checkIn, checkOut, isBest, label = 'Book →', btnClass }) {
  const [busy, setBusy] = useState(false);

  async function handleClick() {
    if (busy) return;
    setBusy(true);
    const q = encodeURIComponent(`${hotel.name} ${hotel.city}`);
    const fallback = `https://www.booking.com/search.html?ss=${q}&checkin=${checkIn}&checkout=${checkOut}&no_rooms=1&group_adults=2&lang=en-us`;
    const tab = window.open('about:blank', '_blank');
    try {
      const response = await fetch(`/api/kimpton-propcode?url=${encodeURIComponent(hotel.url || '')}&name=${encodeURIComponent(hotel.name || '')}`);
      const data = await response.json();
      const target = data.propCode
        ? buildIhgSelectRoomrateUrl(data.brand || 'kimptonhotels', data.region || 'us', data.locale || 'en', data.propCode, hotel.address || '', checkIn, checkOut)
        : fallback;
      if (tab) tab.location.href = target;
      else window.open(target, '_blank');
    } catch {
      if (tab) tab.location.href = fallback;
      else window.open(fallback, '_blank');
    } finally {
      setBusy(false);
    }
  }

  return (
    <button onClick={handleClick} disabled={busy}
      className={btnClass || `rate-book ${isBest ? 'gold' : ''}`}
      style={{ cursor: busy ? 'wait' : 'pointer' }}>
      {busy ? '…' : label}
    </button>
  );
}

// ─── DATE RANGE PICKER ────────────────────────────────────────────────────────
function DateRangePicker({ value, onChange, minDate }) {
  const today = minDate || todayStr();
  const [open, setOpen] = useState(false);
  const [step, setStep] = useState('in');
  const [tempIn, setTempIn] = useState(null);
  const [hover, setHover] = useState(null);
  const ref = useRef(null);

  const initY = parseInt((value.checkIn || today).split('-')[0]);
  const initM = parseInt((value.checkIn || today).split('-')[1]) - 1;
  const [viewY, setViewY] = useState(initY);
  const [viewM, setViewM] = useState(initM);

  useEffect(() => {
    const fn = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', fn);
    return () => document.removeEventListener('mousedown', fn);
  }, []);

  const getDays = (y, m) => {
    const first = new Date(y, m, 1).getDay();
    const total = new Date(y, m + 1, 0).getDate();
    const days = Array(first).fill(null);
    for (let d = 1; d <= total; d++)
      days.push(`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`);
    return days;
  };

  const prevMonth = () => { if (viewM === 0) { setViewM(11); setViewY(y => y-1); } else setViewM(m => m-1); };
  const nextMonth = () => { if (viewM === 11) { setViewM(0); setViewY(y => y+1); } else setViewM(m => m+1); };

  const monthLabel = new Date(viewY, viewM, 1).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
  const days = getDays(viewY, viewM);

  const s = value.checkIn, e = value.checkOut;
  const activeSel = step === 'out' ? tempIn : s;
  const activeEnd = step === 'out' ? (hover && hover > tempIn ? hover : null) : e;

  const handleDay = ds => {
    if (ds < today) return;
    if (step === 'in') {
      setTempIn(ds); setStep('out'); setHover(null);
    } else {
      if (ds <= tempIn) { setTempIn(ds); setHover(null); return; }
      onChange({ checkIn: tempIn, checkOut: ds });
      setOpen(false); setStep('in'); setTempIn(null);
    }
  };

  const open_ = () => {
    setStep('in'); setTempIn(null); setHover(null);
    const base = value.checkIn || today;
    setViewY(parseInt(base.split('-')[0]));
    setViewM(parseInt(base.split('-')[1]) - 1);
    setOpen(true);
  };

  const label = value.checkIn && value.checkOut
    ? `${formatDate(value.checkIn)} – ${formatDate(value.checkOut)}`
    : null;

  return (
    <div className="drp-wrap" ref={ref}>
      <div className={`drp-trigger ${label ? '' : 'empty'}`} onClick={open_}>
        <span className="drp-trigger-icon">◈</span>
        <span className="drp-trigger-text">{label || 'Select dates'}</span>
      </div>
      {open && (
        <div className="drp-cal">
          <div className="drp-cal-header">
            <div className="drp-cal-nav" onClick={prevMonth}>‹</div>
            <div className="drp-cal-month">{monthLabel}</div>
            <div className="drp-cal-nav" onClick={nextMonth}>›</div>
          </div>
          <div className="drp-wdays">
            {['Su','Mo','Tu','We','Th','Fr','Sa'].map(w => <div key={w} className="drp-wday">{w}</div>)}
          </div>
          <div className="drp-days">
            {days.map((ds, i) => {
              if (!ds) return <div key={i} />;
              const disabled = ds < today;
              const isStart = ds === activeSel;
              const isEnd = activeEnd && ds === activeEnd && activeEnd > activeSel;
              const inRange = activeSel && activeEnd && ds > activeSel && ds < activeEnd && activeEnd > activeSel;
              const isToday = ds === todayStr();
              let cls = 'drp-day';
              if (disabled) cls += ' drp-disabled';
              else if (isStart || isEnd) cls += ' drp-start';
              else if (inRange) cls += ' drp-in-range';
              if (isToday) cls += ' drp-today';
              return (
                <div key={ds} className={cls}
                  onClick={() => !disabled && handleDay(ds)}
                  onMouseEnter={() => step === 'out' && !disabled && setHover(ds)}
                >
                  {parseInt(ds.split('-')[2])}
                </div>
              );
            })}
          </div>
          <div className="drp-hint">
            {step === 'in' ? 'Select check-in date' : 'Now select check-out'}
          </div>
          {(value.checkIn || value.checkOut) && (
            <div className="drp-clear" onClick={() => { onChange({ checkIn:'', checkOut:'' }); setOpen(false); setStep('in'); setTempIn(null); }}>
              Clear dates
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ─── RECENT SEARCHES ──────────────────────────────────────────────────────────
function useRecentSearches() {
  const KEY = 'hs_recent';
  const [recents, setRecents] = useState(() => {
    try { return JSON.parse(localStorage.getItem(KEY) || '[]'); } catch { return []; }
  });
  const save = useCallback(hotel => {
    setRecents(prev => {
      const next = [hotel, ...prev.filter(h => h.id !== hotel.id)].slice(0, 8);
      try { localStorage.setItem(KEY, JSON.stringify(next)); } catch {}
      return next;
    });
  }, []);
  return [recents, save];
}

// ─── HOTEL SEARCH COMPONENT ───────────────────────────────────────────────────
function HotelSearch({ selectedHotels, onAdd, onRemove, allHotels, recentSearches }) {
  const [query, setQuery] = useState('');
  const [results, setResults] = useState([]);
  const [cityHotels, setCityHotels] = useState([]);
  const [activeIdx, setActiveIdx] = useState(-1);
  const [isFocused, setIsFocused] = useState(false);
  const [selectedCity, setSelectedCity] = useState(null);
  const [searching, setSearching] = useState(false);
  const [cityLoading, setCityLoading] = useState(false);
  const ref = useRef(null);
  const inputRef = useRef(null);
  const debounceRef = useRef(null);

  // Sandbox: city list is always the curated popular destinations
  const cities = POPULAR_DESTINATIONS;
  const fallbackHotels = allHotels.length ? allHotels : HOTELS_STATIC;

  // Typed search → server (debounced — each call costs one SerpAPI credit)
  useEffect(() => {
    if (!query) { setResults([]); setActiveIdx(-1); setSearching(false); return; }
    setActiveIdx(-1);
    clearTimeout(debounceRef.current);
    debounceRef.current = setTimeout(() => {
      setSearching(true);
      const words = query.toLowerCase().split(/\s+/).filter(w => w.length > 2);
      const filterByName = results => words.length
        ? results.filter(h => words.some(w => (h.name || '').toLowerCase().includes(w)))
        : results;
      searchHotelsRemote(query, selectedHotels)
        .then(r => { setResults(filterByName(r)); setSearching(false); })
        .catch(() => { setResults(filterByName(searchHotelsFallback(query, selectedHotels, null, fallbackHotels))); setSearching(false); });
    }, SEARCH_DEBOUNCE_MS);
    return () => clearTimeout(debounceRef.current);
  }, [query, selectedHotels, fallbackHotels]);

  // City drill-down → server (SerpAPI "hotels in [city]")
  useEffect(() => {
    if (!selectedCity) { setCityHotels([]); setCityLoading(false); return; }
    setCityLoading(true);
    searchHotelsRemote('', selectedHotels, selectedCity)
      .then(r => { setCityHotels(r); setCityLoading(false); })
      .catch(() => { setCityHotels(searchHotelsFallback('', selectedHotels, selectedCity, fallbackHotels)); setCityLoading(false); });
  }, [selectedCity, selectedHotels, fallbackHotels]);

  useEffect(() => {
    const fn = e => {
      if (ref.current && !ref.current.contains(e.target)) {
        setQuery(''); setIsFocused(false); setSelectedCity(null);
      }
    };
    document.addEventListener('mousedown', fn);
    return () => document.removeEventListener('mousedown', fn);
  }, []);

  const handleKey = e => {
    if (e.key === 'ArrowDown') { e.preventDefault(); setActiveIdx(i => Math.min(i+1, results.length-1)); }
    if (e.key === 'ArrowUp')   { e.preventDefault(); setActiveIdx(i => Math.max(i-1, 0)); }
    if (e.key === 'Enter' && activeIdx >= 0) { add(results[activeIdx]); }
    if (e.key === 'Escape') { setQuery(''); setIsFocused(false); setSelectedCity(null); inputRef.current?.blur(); }
  };

  const add = hotel => {
    if (selectedHotels.length >= MAX_HOTELS) return;
    onAdd(hotel);
    setQuery('');
    inputRef.current?.focus();
  };

  const maxed = selectedHotels.length >= MAX_HOTELS;
  const showDrop = isFocused && !maxed;
  const stars = n => STAR_CHAR.repeat(n);
  const icon = h => h.stars >= 5 ? '🏰' : h.stars >= 4 ? '🏨' : '🏩';

  const HotelItem = ({ h, i }) => (
    <div className={`search-item ${i === activeIdx ? 'active' : ''}`} onClick={() => add(h)}>
      <div className="search-item-icon">{icon(h)}</div>
      <div className="search-item-body">
        <div className="search-item-name">{h.name}</div>
        <div className="search-item-meta">{h.city} · {h.region}</div>
      </div>
      <div className="search-item-stars" style={{ color: '#C9963A' }}>{stars(h.stars)}</div>
    </div>
  );

  return (
    <div ref={ref}>
      {/* positioned wrapper scoped to just the search box so dropdown appears immediately below it */}
      <div className="search-box-wrap" style={{ position: 'relative' }}>
        <div className="search-box">
          <span className="search-box-icon">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <circle cx="6.5" cy="6.5" r="5" stroke="#9C9C9C" strokeWidth="1.5"/>
              <path d="M10.5 10.5L14 14" stroke="#9C9C9C" strokeWidth="1.5" strokeLinecap="round"/>
            </svg>
          </span>
          <input
            ref={inputRef}
            value={query}
            onChange={e => { setQuery(e.target.value); setSelectedCity(null); }}
            onKeyDown={handleKey}
            onFocus={() => setIsFocused(true)}
            placeholder={maxed ? `Max ${MAX_HOTELS} hotels selected` : 'Search hotels or destinations…'}
            disabled={maxed}
            aria-label="Search hotels or destinations"
          />
        </div>
        {selectedHotels.length > 0 && (
          <div className="search-meta">{selectedHotels.length}/{MAX_HOTELS} selected</div>
        )}

        {/* Typed search — absolute dropdown overlay (standard autocomplete) */}
        {query && showDrop && (
          <div className="search-dropdown">
            {searching
              ? <div className="search-no-results">Searching…</div>
              : results.length === 0
              ? <div className="search-no-results">No results for "{query}" — try a city name or specific hotel</div>
              : results.map((h, i) => <HotelItem key={h.id} h={h} i={i} />)
            }
          </div>
        )}
      </div>

      {!maxed && (
        <div className="search-helper">Type a hotel or city, or browse popular destinations below</div>
      )}

      {/* Browse mode — inline panel, expands inside card section */}
      {!query && isFocused && !maxed && (
        <div className="search-browse-panel">

          {/* Recent searches */}
          {!selectedCity && recentSearches && recentSearches.length > 0 && (
            <div className="recents-section">
              <div className="recents-header">Recent searches</div>
              {recentSearches
                .filter(h => !selectedHotels.some(s => s.id === h.id))
                .slice(0, 4)
                .map((h, i) => <HotelItem key={h.id} h={h} i={-1} />)
              }
            </div>
          )}

          {/* City grid */}
          {!selectedCity && (
            <>
              <div className="city-browse-header">Popular destinations</div>
              <div className="city-grid">
                {cities.map(city => (
                  <button key={city} className="city-btn" onClick={() => setSelectedCity(city)}>
                    <span className="city-btn-name">{city}</span>
                  </button>
                ))}
              </div>
            </>
          )}

          {/* Hotels in selected city */}
          {selectedCity && (
            <>
              <div className="city-back-btn" onClick={() => setSelectedCity(null)}>
                ← All destinations
                <span style={{ fontWeight: 400, color: 'var(--text-3)' }}>· {selectedCity}</span>
              </div>
              <div className="city-hotel-list">
                {cityLoading
                  ? <div className="search-no-results">Loading hotels in {selectedCity}…</div>
                  : cityHotels.map((h, i) => <HotelItem key={h.id} h={h} i={i} />)
                }
              </div>
            </>
          )}

        </div>
      )}

      {selectedHotels.length > 0 && (
        <div className="hotel-tray">
          {selectedHotels.map(h => (
            <div key={h.id} className="hotel-chip">
              <span>{h.name}</span>
              <span className="hotel-chip-city">{h.city}</span>
              <button className="hotel-chip-rm" onClick={() => onRemove(h.id)} title="Remove">×</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── DATE RANGES COMPONENT ────────────────────────────────────────────────────
function DateRanges({ ranges, onChange }) {
  const canAdd = ranges.length < MAX_DATE_RANGES;
  const canRemove = ranges.length > MIN_DATE_RANGES;

  const update = (i, val) => {
    const next = ranges.map((r, ri) => ri === i ? val : r);
    onChange(next);
  };
  const addRow = () => {
    if (!canAdd) return;
    onChange([...ranges, { checkIn: '', checkOut: '' }]);
  };
  const removeRow = i => {
    if (!canRemove) return;
    onChange(ranges.filter((_, ri) => ri !== i));
  };

  return (
    <div>
      <div className="date-rows">
        {ranges.map((r, i) => {
          const nights = r.checkIn && r.checkOut ? nightsBetween(r.checkIn, r.checkOut) : null;
          return (
            <div key={i} className="date-row">
              <span className="date-row-letter">{OPTION_LABELS[i]}</span>
              <DateRangePicker value={r} onChange={val => update(i, val)} minDate={todayStr()} />
              <span className="date-row-arrow">→</span>
              <span className={`date-row-nights ${nights === null ? 'empty' : ''}`}>
                {nights !== null ? `${nights}n` : '—'}
              </span>
              <button className={`date-row-rm ${canRemove ? '' : 'hidden'}`} onClick={() => removeRow(i)} title="Remove">×</button>
            </div>
          );
        })}
      </div>
      <button className="add-date-btn" onClick={addRow} disabled={!canAdd} style={{ marginTop: 10 }}>
        + Add date option {ranges.length < MAX_DATE_RANGES ? `(${MAX_DATE_RANGES - ranges.length} remaining)` : ''}
      </button>
    </div>
  );
}

// ─── SUMMARY CARDS ────────────────────────────────────────────────────────────
function SummaryCards({ flatResults, hotels, validDates, onCardClick }) {
  if (!flatResults || flatResults.length === 0) return null;

  const available = flatResults.filter(r => r.available);
  if (available.length === 0) return null;

  const byAdr = [...available].sort((a, b) => a.rate - b.rate);

  const best = byAdr[0];
  const runnerUp = byAdr[1];
  const bestHotel = hotels.find(h => h.id === best.hotelId);
  const bestDate = validDates[best.dateIdx];
  const bestCellKey = `${best.hotelId}|${best.dateIdx}`;
  const runnerCellKey = runnerUp ? `${runnerUp.hotelId}|${runnerUp.dateIdx}` : bestCellKey;

  return (
    <div className="summary-cards">
      <div className="scard best scard-clickable" onClick={() => onCardClick(bestCellKey)} title="Jump to this cell in the table">
        <div className="scard-label">⭐ Best Nightly Rate</div>
        <div className="scard-value">{formatCurrency(best.rate, best.currency)}<span style={{ fontSize: 13, fontWeight: 400, color: '#5C5C5C' }}>/night</span></div>
        <div className="scard-meta">
          {best.rateDisclaimer || 'Rates may or may not include resort or hotel fees. Taxes are not included.'}<br />
          Option {OPTION_LABELS[best.dateIdx]} · {formatDate(bestDate.checkIn)}–{formatDate(bestDate.checkOut)}
        </div>
        <div className="scard-meta" style={{ fontWeight: 600, color: '#1A1A1A', marginTop: 4 }}>
          {bestHotel?.name}
        </div>
        <div className="scard-action">View in table ↓</div>
      </div>
      <div className="scard scard-clickable" onClick={() => onCardClick(runnerCellKey)} title="Jump to this cell in the table">
        <div className="scard-label">{runnerUp ? 'Next Best Nightly' : 'Also Compared'}</div>
        <div className="scard-value">
          {runnerUp
            ? <>{formatCurrency(runnerUp.rate, runnerUp.currency)}<span style={{ fontSize: 13, fontWeight: 400, color: '#5C5C5C' }}>/night</span></>
            : <span style={{ fontSize: 16 }}>—</span>}
        </div>
        <div className="scard-meta">
          {runnerUp
            ? <>{hotels.find(h => h.id === runnerUp.hotelId)?.name}<br />Option {OPTION_LABELS[runnerUp.dateIdx]}</>
            : <>Only one priced option in this run</>}
        </div>
        <div className="scard-action">View in table ↓</div>
      </div>
      <div className="scard">
        <div className="scard-label">Availability</div>
        <div className="scard-value">{available.length}<span style={{ fontSize: 13, fontWeight: 400, color: '#5C5C5C' }}> / {flatResults.length}</span></div>
        <div className="scard-meta">
          options available<br />
          across {hotels.length} hotel{hotels.length !== 1 ? 's' : ''} × {validDates.length} date range{validDates.length !== 1 ? 's' : ''}
        </div>
      </div>
    </div>
  );
}

// ─── RESULTS TABLE ────────────────────────────────────────────────────────────
function ResultsTable({ results, loadingCells, hotels, validDates, sortBy, onSort, bestKey, highlightKey }) {
  const stars = n => STAR_CHAR.repeat(n);

  const sortedHotels = [...hotels].sort((a, b) => {
    if (sortBy === 'name') return a.name.localeCompare(b.name);
    const getMin = (hotel, field) => {
      const vals = validDates.map((_, di) => results[hotel.id]?.[di])
        .filter(r => r && r.available).map(r => field === 'adr' ? r.rate : r.rate * nightsBetween(validDates[validDates.indexOf(validDates.find((d, di) => results[hotel.id]?.[di] === r))].checkIn || '', validDates[validDates.indexOf(validDates.find((d, di) => results[hotel.id]?.[di] === r))].checkOut || ''));
      return vals.length ? Math.min(...vals) : Infinity;
    };
    // Simpler sort: by minimum rate per night
    const minA = validDates.map((_, di) => results[a.id]?.[di]).filter(r => r?.available).map(r => r.rate);
    const minB = validDates.map((_, di) => results[b.id]?.[di]).filter(r => r?.available).map(r => r.rate);
    const mA = minA.length ? Math.min(...minA) : Infinity;
    const mB = minB.length ? Math.min(...minB) : Infinity;
    return mA - mB;
  });

  return (
    <div className="results-table-card">
      <div className="rtc-toolbar">
        <span className="rtc-toolbar-label">{hotels.length} hotel{hotels.length !== 1 ? 's' : ''} · {validDates.length} date option{validDates.length !== 1 ? 's' : ''}</span>
        <span className="sort-label">Sort by</span>
        <div className="sort-btns">
          {[['adr','Nightly rate'],['name','Name']].map(([k,l]) => (
            <button key={k} className={`sort-btn ${sortBy === k ? 'on' : ''}`} onClick={() => onSort(k)}>{l}</button>
          ))}
        </div>
      </div>
      <div style={{ overflowX: 'auto' }}>
        <table className="rt">
          <thead>
            <tr>
              <th>Hotel</th>
              {validDates.map((d, i) => (
                <th key={i} className="date-th">
                  Option {OPTION_LABELS[i]}<br />
                  <span style={{ fontWeight: 400, textTransform: 'none', letterSpacing: 0, fontSize: 11 }}>
                    {formatDate(d.checkIn)} – {formatDate(d.checkOut)} · {nightsBetween(d.checkIn, d.checkOut)}n
                  </span>
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {sortedHotels.map(hotel => (
              <tr key={hotel.id}>
                <td>
                  <div className="hotel-td">
                    <div className="hotel-td-name">{hotel.name}</div>
                    <div className="hotel-td-city">{hotel.city} · {hotel.region}</div>
                    <div className="hotel-td-stars" style={{ color: '#C9963A' }}>{stars(hotel.stars)}</div>
                  </div>
                </td>
                {validDates.map((d, di) => {
                  const cellKey = `${hotel.id}|${di}`;
                  const loading = loadingCells.has(cellKey);
                  const r = results[hotel.id]?.[di];
                  const isBest = cellKey === bestKey;
                  const isHighlighted = cellKey === highlightKey;
                  const nights = nightsBetween(d.checkIn, d.checkOut);
                  const bookUrl = resolveBookingUrl(hotel, r, d.checkIn, d.checkOut);

                  if (loading) return (
                    <td key={di}>
                      <div className="rate-td">
                        <div className="skel skel-r" />
                        <div className="skel skel-t" />
                        <div className="skel skel-b" />
                      </div>
                    </td>
                  );

                  if (!r) return <td key={di}><div className="rate-td"><span className="rate-unavail">—</span></div></td>;

                  if (!r.available) return (
                    <td key={di}>
                      <div className="rate-td">
                        <div className="rate-unavail">
                          {r.error === 'rate_unverified' ? 'Unverified' :
                           r.error === 'hotel_mismatch' ? 'Hotel mismatch' :
                           r.isDemo ? 'Demo rate' :
                           'Unavailable'}
                        </div>
                        {(r.message || r.isDemo) && (
                          <div style={{ fontSize: 10, color: '#9C9C9C', marginTop: 4, lineHeight: 1.3 }}>
                            {r.message || (r.isDemo ? 'Not a live rate' : '')}
                          </div>
                        )}
                      </div>
                    </td>
                  );

                  const total = r.rate * nights;
                  // Kimpton properties without an IHG prop code need an async scrape on click
                  const needsKimptonLookup = (
                    isKimptonHotel(hotel) && !r.ihgPropCode && !isSupportedBrandUrl(hotel.url)
                  );
                  return (
                    <td key={di}>
                      <div className={`rate-td ${isBest ? 'best' : ''} ${isHighlighted ? 'highlighted' : ''}`}>
                        <div className="rate-td-badge-slot">
                          {isBest && <div className="best-badge">★ Lowest rate</div>}
                        </div>
                        <div className="rate-td-main">
                          <div className="rate-adr">{formatCurrency(r.rate, r.currency)}<span style={{ fontSize: 11, fontWeight: 400, color: '#9C9C9C' }}>/night</span></div>
                          {r.rateSourceLabel && <div className="rate-source-tag">{r.rateSourceLabel}</div>}
                          <div className="rate-disclaimer">{r.rateDisclaimer || 'Rates may or may not include resort or hotel fees. Taxes are not included.'}</div>
                          <div className="rate-nights">{nights} night{nights !== 1 ? 's' : ''}</div>
                        </div>
                        <div className="rate-td-actions">
                          {needsKimptonLookup
                            ? <KimptonBookButton hotel={hotel} checkIn={d.checkIn} checkOut={d.checkOut} isBest={isBest} />
                            : <a href={bookUrl} target="_blank" rel="noopener noreferrer"
                                className={`rate-book ${isBest ? 'gold' : ''}`}>
                                Book →
                              </a>
                          }
                        </div>
                      </div>                    </td>
                  );
                })}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ─── MODAL ────────────────────────────────────────────────────────────────────
function Modal({ title, onClose, children }) {
  useEffect(() => {
    const fn = e => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', fn);
    return () => document.removeEventListener('keydown', fn);
  }, [onClose]);
  return (
    <div className="modal-overlay" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="modal-panel">
        <div className="modal-header">
          <div className="modal-title">{title}</div>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">{children}</div>
      </div>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [recentSearches, saveRecent] = useRecentSearches();
  const [selectedHotels, setSelectedHotels] = useState([]);
  const [allHotels, setAllHotels] = useState([]);
  const [dateRanges, setDateRanges] = useState([
    { checkIn: '', checkOut: '' },
    { checkIn: '', checkOut: '' },
  ]);
  const [results, setResults] = useState({});
  const [loadingCells, setLoadingCells] = useState(new Set());
  const [isComparing, setIsComparing] = useState(false);
  const [showResults, setShowResults] = useState(false);
  const [sortBy, setSortBy] = useState('adr');
  const [usageNotice, setUsageNotice] = useState(null);
  const [modal, setModal] = useState(null); // null | 'about' | 'casestudy'
  const [highlightKey, setHighlightKey] = useState(null);
  const [stepLayout, setStepLayout] = useState(() => {
    try { return localStorage.getItem('hs-step-layout') || 'columns'; } catch { return 'columns'; }
  });
  const resultsRef = useRef(null);
  const tableRef = useRef(null);

  useEffect(() => {
    try { localStorage.setItem('hs-step-layout', stepLayout); } catch {}
  }, [stepLayout]);

  // Load full hotel list from server on mount
  useEffect(() => {
    fetch('/api/hotels')
      .then(r => r.json())
      .then(hotels => setAllHotels(hotels.length ? hotels : HOTELS_STATIC))
      .catch(() => setAllHotels(HOTELS_STATIC));
  }, []);

  const handleCardClick = (key) => {
    setHighlightKey(key);
    tableRef.current?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    setTimeout(() => setHighlightKey(null), 2200);
  };

  const validDates = dateRanges.filter(d => d.checkIn && d.checkOut && d.checkOut > d.checkIn);
  const canCompare = selectedHotels.length >= MIN_HOTELS && validDates.length >= MIN_DATE_RANGES && !isComparing;

  const hotelsMet = selectedHotels.length >= MIN_HOTELS;
  const datesMet  = validDates.length >= MIN_DATE_RANGES;

  // Flatten results for summary
  const flatResults = selectedHotels.flatMap(hotel =>
    validDates.map((d, di) => {
      const r = results[hotel.id]?.[di];
      if (!r?.available) return null;
      return { ...r, hotelId: hotel.id, dateIdx: di, nights: nightsBetween(d.checkIn, d.checkOut), total: r.rate * nightsBetween(d.checkIn, d.checkOut) };
    }).filter(Boolean)
  );

  // Best cell key
  const bestKey = (() => {
    if (!flatResults.length) return null;
    const best = flatResults.reduce((a, b) => b.rate < a.rate ? b : a);
    return `${best.hotelId}|${best.dateIdx}`;
  })();

  const compareRates = () => {
    if (!canCompare) return;
    setIsComparing(true);
    setShowResults(false);
    setResults({});
    setUsageNotice(null);

    // Build loading set
    const cells = new Set();
    selectedHotels.forEach(h => validDates.forEach((_, di) => cells.add(`${h.id}|${di}`)));
    setLoadingCells(cells);

    // Staggered async fetch — live rates via server, simulation fallback
    const promises = [];
    selectedHotels.forEach((hotel, hi) => {
      validDates.forEach((dr, di) => {
        const delay = hi * 280 + di * 90 + 100;
        const p = new Promise(resolve => setTimeout(resolve, delay))
          .then(() => fetchRate(hotel, dr.checkIn, dr.checkOut))
          .then(rateData => {
            if (rateData.quotaLimited && rateData.message) setUsageNotice(rateData.message);
            setResults(prev => ({
              ...prev,
              [hotel.id]: { ...(prev[hotel.id] || {}), [di]: rateData }
            }));
            setLoadingCells(prev => {
              const next = new Set(prev);
              next.delete(`${hotel.id}|${di}`);
              return next;
            });
          });
        promises.push(p);
      });
    });

    Promise.all(promises).then(() => {
      setIsComparing(false);
      setShowResults(true);
      setTimeout(() => resultsRef.current?.scrollIntoView({ behavior: 'smooth', block: 'start' }), 80);
    });
  };

  const addHotel = hotel => {
    if (selectedHotels.length >= MAX_HOTELS) return;
    if (selectedHotels.find(h => h.id === hotel.id)) return;
    setSelectedHotels(prev => [...prev, hotel]);
    saveRecent(hotel);
    setShowResults(false);
  };
  const removeHotel = id => {
    setSelectedHotels(prev => prev.filter(h => h.id !== id));
    setShowResults(false);
  };

  return (
    <div className="page">
      {/* NAV */}
      <div className="hero-section-wrap">
      <nav className="nav">
        <div className="nav-inner">
          <div className="nav-logo">Hotel <em>Scanner</em></div>
          <div className="nav-right">
            <button className="nav-link" onClick={() => setModal('casestudy')}>About</button>
            <div className="nav-badge">Portfolio Prototype</div>
            <div className="nav-badge">Sandbox</div>
          </div>
        </div>
      </nav>

      {/* HERO */}
      <div className="hero">
        <h1 className="hero-headline">
          Compare rates<br />
          across dates,<br />
          <em>not across tabs.</em>
        </h1>
        <p className="hero-value">
          Add the hotels you want.<br />
          Pick the dates that could work.<br />
          See every combination at once.
        </p>
        <p className="hero-note">Search any hotel anywhere — sandbox powered by live SerpAPI data.</p>
      </div>
      </div>

      {/* MAIN CARD */}
      <div className="container">
        <div className="main-card">

          <div className="step-layout-bar">
            <div className="step-layout-group">
              <span className="step-layout-label">View</span>
              <div className="step-layout-toggle" role="group" aria-label="View: stacked or side by side">
              <button
                type="button"
                className={`step-layout-btn ${stepLayout === 'rows' ? 'on' : ''}`}
                onClick={() => setStepLayout('rows')}
              >Stacked</button>
              <button
                type="button"
                className={`step-layout-btn ${stepLayout === 'columns' ? 'on' : ''}`}
                onClick={() => setStepLayout('columns')}
              >Side by side</button>
              </div>
            </div>
          </div>

          <div className={`main-card-steps layout-${stepLayout}`}>
          {/* STEP 1 — Hotels */}
          <div className="main-card-section main-card-section--hotels">
            <div className="section-label">
              <span className="section-num">1</span>
              <span className="section-title">Search and add hotels</span>
              <span className="section-subtitle">Up to {MAX_HOTELS}</span>
            </div>
            <HotelSearch
              selectedHotels={selectedHotels}
              onAdd={addHotel}
              onRemove={removeHotel}
              allHotels={allHotels}
              recentSearches={recentSearches}
            />
          </div>

          {/* STEP 2 — Dates */}
          <div className="main-card-section main-card-section--dates">
            <div className="section-label">
              <span className="section-num">2</span>
              <span className="section-title">Add date options</span>
              <span className="section-subtitle">{MIN_DATE_RANGES} – {MAX_DATE_RANGES} ranges</span>
            </div>
            <DateRanges ranges={dateRanges} onChange={setDateRanges} />
          </div>
          </div>

          {/* STEP 3 — CTA */}
          <div className="cta-wrap">
            <div className="cta-inner">
              <button className="compare-btn" onClick={compareRates} disabled={!canCompare}>
                {isComparing ? (
                  <><div className="spinner" /> Scanning rates…</>
                ) : (
                  <>Compare Rates</>
                )}
              </button>
              <div className="cta-checklist">
                <div className="cta-req">
                  <span className={`cta-dot ${hotelsMet ? 'met' : ''}`} />
                  {hotelsMet ? `${selectedHotels.length} hotel${selectedHotels.length !== 1 ? 's' : ''} selected` : `Select at least ${MIN_HOTELS} hotel`}
                </div>
                <div className="cta-req">
                  <span className={`cta-dot ${datesMet ? 'met' : ''}`} />
                  {datesMet ? `${validDates.length} date range${validDates.length !== 1 ? 's' : ''} ready` : `Add at least ${MIN_DATE_RANGES} complete date ranges`}
                </div>
              </div>
            </div>
          </div>

        </div>

        {/* RESULTS */}
        {(showResults || loadingCells.size > 0) && (
          <div className="results-section" ref={resultsRef}>
            {usageNotice && (
              <div className="usage-notice">
                <strong>Prototype note:</strong> {usageNotice}
              </div>
            )}
            <SummaryCards
              flatResults={flatResults}
              hotels={selectedHotels}
              validDates={validDates}
              onCardClick={handleCardClick}
            />
            <div ref={tableRef}>
              <ResultsTable
                results={results}
                loadingCells={loadingCells}
                hotels={selectedHotels}
                validDates={validDates}
                sortBy={sortBy}
                onSort={setSortBy}
                bestKey={bestKey}
                highlightKey={highlightKey}
              />
            </div>
          </div>
        )}

      </div>

      {/* FOOTER */}
      <footer className="footer">
        <div className="footer-author">
          Built by <a className="footer-a" href="https://linkedin.com/in/paultotah" target="_blank" rel="noopener noreferrer">Paul Totah</a>
        </div>
      </footer>

      {/* MODAL — About */}
      {modal === 'casestudy' && (
        <Modal title="About" onClose={() => setModal(null)}>

          <div className="modal-section-label">What to know</div>
          <div className="modal-grid">
            <div className="modal-card">
              <div className="modal-card-tag">Booking links</div>
              <div className="modal-card-text">"Book →" links directly to brand.com (Marriott, Hilton, Hyatt, IHG) with your dates pre-filled. Rates match what's shown — the link comes from the same SerpAPI call that fetched the rate. Falls back to Booking.com for independent hotels.</div>
            </div>
            <div className="modal-card">
              <div className="modal-card-tag">Sandbox environment</div>
              <div className="modal-card-text">This build tests open-ended hotel discovery via SerpAPI. Search any hotel anywhere in the world — rates and results are from live hotel search data.</div>
            </div>
          </div>

          <div className="modal-section-label" style={{ marginTop: '28px' }}>Why I built this</div>
          <div className="modal-grid">
            <div className="modal-card">
              <div className="modal-card-tag">The Problem</div>
              <div className="modal-card-text">When you already know which hotel you want, comparing rates across multiple possible travel dates is painful. You open tabs, write down prices, and repeat. The data exists — it's just never in one place.</div>
            </div>
            <div className="modal-card">
              <div className="modal-card-tag">The Approach</div>
              <div className="modal-card-text">A multi-axis rate matrix: pin the hotels you're considering, add the date ranges that could work, and see the complete grid at once. One view replaces a dozen searches.</div>
            </div>
            <div className="modal-card">
              <div className="modal-card-tag">What This Demonstrates</div>
              <div className="modal-card-text">This demonstrates product thinking: a clearly defined problem, deliberate MVP scoping, and progressive disclosure of complexity. It also reflects technical execution: React architecture, progressive async state, and deep-link booking integration across Marriott, Hyatt, IHG, and Hilton — with a clear path to a live rates API.</div>
            </div>
          </div>

        </Modal>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
